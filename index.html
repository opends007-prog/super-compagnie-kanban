<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Super Compagnie — Kanban</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#c9d1d9;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:#161b22;padding:10px 18px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.hdr h1{font-size:15px;color:#58a6ff}
.hdr-r{display:flex;gap:8px;align-items:center}
.stats{display:flex;gap:5px;font-size:10px;flex-wrap:wrap}
.stat{padding:2px 6px;border-radius:7px;background:#21262d}
.stat.c{background:#da3633;color:#fff}
.stat.d{background:#238636;color:#fff}
.stat.i{background:#d29922;color:#fff}
.stat.b{background:#6e40c9;color:#fff}
.btn{background:#238636;color:#fff;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:600}
.btn:hover{background:#2ea043}
.vu{display:flex;gap:2px}
.vb{background:#21262d;color:#8b949e;border:1px solid #30363d;padding:3px 8px;border-radius:3px;cursor:pointer;font-size:10px}
.vb.act{background:#1f6feb;color:#fff;border-color:#1f6feb}
.ts{font-size:9px;color:#484f58}
.main{display:flex;flex:1;overflow:hidden}
.board{display:flex;gap:8px;padding:12px;overflow-x:auto;flex:1}
.col{min-width:250px;max-width:300px;flex:1;background:#161b22;border-radius:6px;padding:8px;border:1px solid #30363d;display:flex;flex-direction:column}
.ch{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;padding:4px 0;margin-bottom:4px;border-bottom:2px solid;display:flex;justify-content:space-between}
.ch .cnt{font-size:8px;background:#30363d;padding:1px 4px;border-radius:5px}
.bl .ch{color:#8b949e;border-color:#8b949e}
.ip .ch{color:#d29922;border-color:#d29922}
.rv .ch{color:#a371f7;border-color:#a371f7}
.dn .ch{color:#3fb950;border-color:#3fb950}
.cc{flex:1;overflow-y:auto}
/* Epic group */
.eg{margin-bottom:6px}
.el{font-size:8px;color:#1f6feb;font-family:monospace;padding:2px 5px;background:#1c2128;border-left:2px solid #1f6feb;margin-bottom:2px;border-radius:0 3px 3px 0;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.el:hover{background:#21262d}
/* Ticket */
.tk{background:#21262d;border:1px solid #30363d;border-radius:4px;padding:6px;margin-bottom:3px;cursor:pointer;transition:border-color .1s}
.tk:hover{border-color:#58a6ff}
.tk.blk{opacity:.5;border-color:#6e40c9}
.tk.ec{margin-left:8px;border-left:2px solid #30363d}
.tk-t{display:flex;justify-content:space-between;align-items:flex-start}
.tk-id{font-size:8px;color:#484f58;font-family:monospace;font-weight:600}
.tk-title{font-size:11px;font-weight:500;margin:2px 0;line-height:1.3}
.tk-tags{display:flex;gap:3px;margin-top:3px;flex-wrap:wrap;align-items:center}
.badge{font-size:7px;padding:1px 4px;border-radius:5px;font-weight:600;text-transform:uppercase}
.badge.c{background:#da3633;color:#fff}
.badge.h{background:#f85149;color:#fff}
.badge.m{background:#d29922;color:#fff}
.badge.l{background:#3fb950;color:#fff}
.badge.in{background:#1f6feb;color:#fff}
.badge.se{background:#8957e5;color:#fff}
.badge.bg{background:#f85149;color:#fff}
.badge.fe{background:#3fb950;color:#fff}
.badge.ar{background:#6e7681;color:#fff}
.badge.bl{background:#6e40c9;color:#fff}
.tk-asg{font-size:9px;color:#484f58;margin-top:2px}
.tk-ep{font-size:8px;color:#1f6feb;font-family:monospace}
/* Epic color bar */
.ecb{float:left;width:3px;min-height:100%;border-radius:2px;margin-right:5px}
/* Detail panel */
.dp{width:380px;background:#161b22;border-left:1px solid #30363d;display:none;flex-direction:column;flex-shrink:0;overflow:hidden}
.dp.op{display:flex}
.dp-h{padding:10px 14px;border-bottom:1px solid #30363d;display:flex;justify-content:space-between;align-items:center}
.dp-h h2{font-size:12px;font-weight:600}
.dp-x{background:none;border:none;color:#8b949e;font-size:14px;cursor:pointer;padding:1px 4px;border-radius:3px}
.dp-x:hover{background:#21262d}
.dp-b{flex:1;overflow-y:auto;padding:14px}
.ds{margin-bottom:12px}
.dl{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:#484f58;margin-bottom:2px}
.dv{font-size:11px;line-height:1.4}
.di{font-family:monospace;color:#1f6feb;font-size:10px}
.dt{font-size:14px;font-weight:600;margin:5px 0}
.dd{font-size:11px;color:#c9d1d9;line-height:1.5;background:#0d1117;padding:7px;border-radius:4px;border:1px solid #30363d}
.dr{display:flex;gap:8px;margin-bottom:8px}
.dc{flex:1}
.ss,.as{background:#21262d;color:#c9d1d9;border:1px solid #30363d;padding:2px 5px;border-radius:3px;font-size:10px;width:100%}
.cm{padding:5px;border-radius:3px;border:1px solid #30363d;margin-bottom:3px;font-size:10px}
.cm-by{font-weight:600;color:#1f6feb;font-size:9px}
.bi{font-size:9px;color:#6e40c9;padding:1px 0}
.si{font-size:9px;padding:1px 0;display:flex;align-items:center;gap:4px}
.sd{width:5px;height:5px;border-radius:50%}
.sd.done{background:#3fb950}
.sd.in_progress{background:#d29922}
.sd.backlog{background:#30363d}
.sd.blocked{background:#6e40c9}
.pd{font-size:10px;font-weight:600}
/* Epic card (epics view) */
.ec{background:#1c2128;border:1px solid #30363d;border-left:3px solid #58a6ff;border-radius:5px;padding:10px;margin-bottom:8px;cursor:pointer}
.ec:hover{border-color:#58a6ff}
.ec-t{display:flex;justify-content:space-between;align-items:flex-start}
.ec-id{font-size:8px;color:#1f6feb;font-family:monospace;font-weight:600}
.ec-title{font-size:12px;font-weight:600;margin:3px 0;line-height:1.3}
.ep{height:3px;background:#21262d;border-radius:1px;margin:5px 0;overflow:hidden}
.epb{height:100%;border-radius:1px;transition:width .3s}
.epb.c{background:#da3633}
.epb.h{background:#f85149}
.epb.m{background:#d29922}
.epb.l{background:#3fb950}
.em{display:flex;gap:5px;align-items:center;font-size:8px;color:#484f58}
.esd{margin-top:4px;padding-top:4px;border-top:1px dashed #30363d}
.esdot{display:inline-block;width:4px;height:4px;border-radius:50%;margin-right:1px}
.esdot.done{background:#3fb950}
.esdot.in_progress{background:#d29922}
.esdot.backlog{background:#30363d}
.esdot.blocked{background:#6e40c9}
/* Agent card (team view) */
.ac{background:#21262d;border:1px solid #30363d;border-radius:5px;padding:8px;margin-bottom:5px}
.at{display:flex;justify-content:space-between;align-items:center}
.ae{font-size:18px}
.ast{font-size:8px;padding:1px 5px;border-radius:5px}
.an{font-size:12px;font-weight:600;margin-top:4px;color:#c9d1d9}
.at2{font-size:9px;color:#1f6feb;margin-top:1px;font-weight:500}
.ar2{font-size:9px;color:#484f58;margin-top:3px;line-height:1.3}
/* Story view */
.sv-ticket{background:#21262d;border:1px solid #30363d;border-radius:4px;padding:8px;margin-bottom:4px;cursor:pointer}
.sv-ticket:hover{border-color:#58a6ff}
.sv-epic{font-size:8px;color:#1f6feb;font-family:monospace;margin-bottom:2px}
.sv-title{font-size:11px;font-weight:500;margin:2px 0}
.sv-meta{display:flex;gap:4px;align-items:center;margin-top:3px}
.sv-agent{font-size:9px;color:#58a6ff;font-weight:600}
/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#30363d;border-radius:2px}
</style>
</head>
<body>
<div class="hdr">
  <h1>💎 Super Compagnie — Kanban</h1>
  <div class="stats" id="stats"></div>
  <div class="hdr-r">
    <div class="vu">
      <button class="vb act" id="vb-board" onclick="goView('board')">📋 Board</button>
      <button class="vb" id="vb-epics" onclick="goView('epics')">📁 Epics</button>
      <button class="vb" id="vb-stories" onclick="goView('stories')">📖 Stories</button>
      <button class="vb" id="vb-team" onclick="goView('team')">👥 Team</button>
    </div>
    <span class="ts" id="ts"></span>
    <button class="btn" onclick="loadData()">↻ Refresh</button>
  </div>
</div>
<div class="main">
  <div class="board" id="board">
    <div class="col bl"><div class="ch">📋 Backlog <span class="cnt" id="c-bg"></span></div><div class="cc" id="bg"></div></div>
    <div class="col ip"><div class="ch">🔧 In Progress <span class="cnt" id="c-ip"></span></div><div class="cc" id="ip"></div></div>
    <div class="col rv"><div class="ch">👀 Review <span class="cnt" id="c-rv"></span></div><div class="cc" id="rv"></div></div>
    <div class="col dn"><div class="ch">✅ Done <span class="cnt" id="c-dn"></span></div><div class="cc" id="dn"></div></div>
  </div>
  <div class="dp" id="dp">
    <div class="dp-h"><h2 id="dtitle">Detail</h2><button class="dp-x" onclick="closeDetail()">✕</button></div>
    <div class="dp-b" id="db"></div>
  </div>
</div>
<script>
var D={epics:[],tickets:[],stats:{}};
var CV='board';
var EC=['#1f6feb','#a371f7','#f0883e','#3fb950','#f85149','#8957e5'];

var AGENTS=[
  {id:'lucy',name:'Lucy',title:'COO',team:'Leadership',role:'Secretary, Gatekeeper',emoji:'👩‍💼',status:'active'},
  {id:'orchestrator',name:'Zeus',title:'Team Lead',team:'Leadership',role:'Manages project teams',emoji:'⚡',status:'active'},
  {id:'tom',name:'Gladiator',title:'Senior Developer',team:'Project',role:'Coding, file ops, research',emoji:'⚔️',status:'active'},
  {id:'devops',name:'Thor',title:'Infrastructure Engineer',team:'Project',role:'CI/CD, Docker, deployments',emoji:'🔨',status:'idle'},
  {id:'qa',name:'Athena',title:'QA Lead',team:'Project',role:'Testing, bug finding',emoji:'🛡️',status:'idle'},
  {id:'security',name:'Hades',title:'Security Specialist',team:'Project',role:'Security audits',emoji:'💀',status:'idle'},
  {id:'pm',name:'Iris',title:'Project Manager',team:'Project',role:'Planning, roadmaps',emoji:'🌈',status:'idle'},
  {id:'research',name:'Hermes',title:'Market Intel Lead',team:'Research',role:'Scans for opportunities',emoji:'📡',status:'idle'},
  {id:'business-analyst',name:'Minerva',title:'Strategy Analyst',team:'Research',role:'Competitive analysis',emoji:'🔮',status:'idle'},
  {id:'data-analyst',name:'Clio',title:'Analytics Lead',team:'Research',role:'Metrics, dashboards',emoji:'📊',status:'idle'},
  {id:'data-engineer',name:'Vulcan',title:'Data Engineer',team:'Research',role:'Data pipelines, ETL',emoji:'🔥',status:'idle'},
  {id:'finance',name:'Plutus',title:'Finance Director',team:'Finance',role:'Financial planning',emoji:'💰',status:'idle'},
  {id:'accounting',name:'Hestia',title:'Head of Accounting',team:'Finance',role:'Bookkeeping',emoji:'📒',status:'idle'},
  {id:'budget',name:'Juno',title:'Budget Manager',team:'Finance',role:'Resource allocation',emoji:'⚖️',status:'idle'},
  {id:'income',name:'Fortuna',title:'Revenue Lead',team:'Finance',role:'Revenue tracking',emoji:'🍀',status:'idle'},
  {id:'sentinel',name:'Nemesis',title:'External Auditor',team:'Security',role:'Independent security audit',emoji:'👁️',status:'idle'},
  {id:'monitor',name:'Argus',title:'24/7 Watchdog',team:'Operations',role:'Infrastructure monitoring',emoji:'🔭',status:'active'},
  {id:'org-excellence',name:'Metis',title:'Org Excellence Lead',team:'Operations',role:'Team optimization',emoji:'🧠',status:'idle'}
];

function loadData(){
  fetch('tickets.json?t='+Date.now())
    .then(function(r){return r.json()})
    .then(function(d){D=d;recalc();render()})
    .catch(function(e){console.error(e)});
}

function recalc(){
  var tk=D.tickets||[], ep=D.epics||[];
  ep.forEach(function(e){
    var st=tk.filter(function(t){return t.epicId===e.id});
    if(!st.length){e.progress=0;e.status='backlog';return}
    var dn=st.filter(function(s){return s.status==='done'}).length;
    var ip=st.filter(function(s){return s.status==='in_progress'}).length;
    var rv=st.filter(function(s){return s.status==='review'}).length;
    e.progress=Math.round(dn/st.length*100);
    e.status=(dn===st.length)?'done':(ip>0||rv>0)?'in_progress':'backlog';
  });
  D.stats={totalEpics:ep.length,totalTickets:tk.length,backlog:tk.filter(function(t){return t.status==='backlog'}).length,in_progress:tk.filter(function(t){return t.status==='in_progress'}).length,review:tk.filter(function(t){return t.status==='review'}).length,done:tk.filter(function(t){return t.status==='done'}).length,critical:tk.filter(function(t){return t.severity==='CRITICAL'}).length,blocked:tk.filter(function(t){return t.blockedBy}).length};
}

function goView(v){
  CV=v;
  document.querySelectorAll('.vb').forEach(function(b){b.classList.remove('act')});
  document.getElementById('vb-'+v).classList.add('act');
  render();
}

function render(){
  try{
    closeDetail();
    if(CV==='epics'){rEpics()}else if(CV==='team'){rTeam()}else if(CV==='stories'){rStories()}else{rBoard()}
    rStats();
    document.getElementById('ts').textContent='Updated: '+(new Date()).toLocaleTimeString();
  }catch(e){console.error(e)}
}

/* ─── BOARD ─── */
function rBoard(){
  var ep=D.epics||[],tk=D.tickets||[];
  var bs={bg:[],ip:[],rv:[],dn:[]};
  tk.forEach(function(t){if(bs[t.status])bs[t.status].push(t)});
  var ecm={};ep.forEach(function(e,i){ecm[e.id]=EC[i%EC.length]});
  ['bg','ip','rv','dn'].forEach(function(s){
    var el=document.getElementById(s),ct=bs[s],h='';
    var eg={},orph=[];
    ct.forEach(function(t){if(t.epicId&&ecm[t.epicId]){if(!eg[t.epicId])eg[t.epicId]=[];eg[t.epicId].push(t)}else{orph.push(t)}});
    ep.forEach(function(e){if(eg[e.id]){h+='<div class="eg"><div class="el" onclick="openED(\''+e.id+'\')">⬆ '+e.id+': '+e.title+'</div>';eg[e.id].forEach(function(t){h+=tkHTML(t,ecm[t.epicId])});h+='</div>'}});
    orph.forEach(function(t){h+=tkHTML(t,null)});
    el.innerHTML=h||'<div style="color:#30363d;font-size:9px;padding:12px;text-align:center">Empty</div>';
    document.getElementById('c-'+s).textContent='('+ct.length+')';
  });
}

function tkHTML(t,ec){
  var bl=!!t.blockedBy;
  var cb=ec?'<div class="ecb" style="background:'+ec+'"></div>':'';
  return '<div class="tk'+(bl?' blk':'')+(t.epicId?' ec':'')+'" onclick="openTD(\''+t.id+'\')">'+
    cb+'<div class="tk-t"><span class="tk-id">'+t.id+'</span>'+(bl?'<span class="badge bl">BLOCKED</span>':'')+'</div>'+
    '<div class="tk-title">'+t.title+'</div>'+
    '<div class="tk-tags"><span class="badge '+(t.severity||'').toLowerCase()+'">'+(t.severity||'')+'</span><span class="badge '+(t.category||'bug')+'">'+(t.category||'bug')+'</span>'+(t.epicId?'<span class="tk-ep">⬆ '+t.epicId+'</span>':'')+'</div>'+
    '<div class="tk-asg">'+(t.assigned_to?'👤 '+t.assigned_to:'👤 Unassigned')+'</div>'+
  '</div>';
}

/* ─── EPICS ─── */
function rEpics(){
  var ep=D.epics||[],tk=D.tickets||[],b=document.getElementById('board'),h='';
  ep.forEach(function(e){
    var st=tk.filter(function(t){return t.epicId===e.id});
    var dn=st.filter(function(s){return s.status==='done'}).length;
    var pct=st.length?Math.round(dn/st.length*100):0;
    var bc=(e.priority||'medium');
    var blk=st.filter(function(s){return s.blockedBy}).length;
    h+='<div class="ec" onclick="openED(\''+e.id+'\')">'+
      '<div class="ec-t"><span class="ec-id">'+e.id+'</span><span class="badge '+bc+'">'+(e.priority||'')+'</span></div>'+
      '<div class="ec-title">'+e.title+'</div>'+
      '<div class="ep"><div class="epb '+bc+'" style="width:'+pct+'%"></div></div>'+
      '<div class="em"><span>👤 '+(e.assignee||'—')+'</span><span>📁 '+(e.team||'—')+'</span><span>'+pct+'% ('+dn+'/'+st.length+')</span>'+(blk?'<span class="badge bl">'+blk+' blocked</span>':'')+'</div>'+
      '<div class="esd">'+st.map(function(s){return '<span class="esdot '+s.status+'" title="'+s.id+': '+s.title+'"></span>'}).join('')+'</div>'+
    '</div>';
  });
  if(!ep.length)h='<div style="color:#30363d;font-size:11px;padding:30px;text-align:center;width:100%">No epics</div>';
  b.innerHTML=h;
}

/* ─── STORIES (agent-focused) ─── */
function rStories(){
  var tk=D.tickets||[],ep=D.epics||[],b=document.getElementById('board'),h='';
  // Group by assigned agent
  var byAgent={};
  var unassigned=[];
  tk.forEach(function(t){
    if(t.assigned_to){
      if(!byAgent[t.assigned_to])byAgent[t.assigned_to]=[];
      byAgent[t.assigned_to].push(t);
    }else{unassigned.push(t)}
  });
  // Render each agent's column
  var agentNames=Object.keys(byAgent).sort();
  agentNames.forEach(function(name){
    var agent=AGENTS.find(function(a){return a.name===name});
    var emoji=agent?agent.emoji:'👤';
    var title=agent?name+' ('+agent.title+')':name;
    var stories=byAgent[name];
    h+='<div class="col"><div class="ch" style="color:#58a6ff;border-color:#58a6ff;">'+emoji+' '+title+' <span class="cnt">('+stories.length+')</span></div><div class="cc">';
    stories.forEach(function(t){
      var epic=ep.find(function(e){return e.id===t.epicId});
      h+='<div class="sv-ticket'+(t.blockedBy?' blk':'')+'" onclick="openTD(\''+t.id+'\')">'+
        (epic?'<div class="sv-epic">⬆ '+epic.id+': '+epic.title+'</div>':'')+
        '<div class="sv-title">'+t.title+'</div>'+
        '<div class="sv-meta"><span class="badge '+(t.severity||'').toLowerCase()+'">'+(t.severity||'')+'</span><span class="badge '+(t.category||'bug')+'">'+(t.category||'bug')+'</span><span class="sv-agent">'+t.status.replace(/_/g,' ')+'</span></div>'+
      '</div>';
    });
    h+='</div></div>';
  });
  // Unassigned column
  if(unassigned.length||!agentNames.length){
    h+='<div class="col"><div class="ch" style="color:#f0883e;border-color:#f0883e;">❓ Unassigned <span class="cnt">('+unassigned.length+')</span></div><div class="cc">';
    unassigned.forEach(function(t){
      var epic=ep.find(function(e){return e.id===t.epicId});
      h+='<div class="sv-ticket'+(t.blockedBy?' blk':'')+'" onclick="openTD(\''+t.id+'\')">'+
        (epic?'<div class="sv-epic">⬆ '+epic.id+': '+epic.title+'</div>':'')+
        '<div class="sv-title">'+t.title+'</div>'+
        '<div class="sv-meta"><span class="badge '+(t.severity||'').toLowerCase()+'">'+(t.severity||'')+'</span><span class="badge '+(t.category||'bug')+'">'+(t.category||'bug')+'</span></div>'+
      '</div>';
    });
    h+='</div></div>';
  }
  b.innerHTML=h;
}

/* ─── TEAM ─── */
function rTeam(){
  var b=document.getElementById('board'),teams={};
  AGENTS.forEach(function(a){if(!teams[a.team])teams[a.team]=[];teams[a.team].push(a)});
  var order=['Leadership','Project','Research','Finance','Security','Operations'];
  var h='';
  order.forEach(function(tm){
    if(!teams[tm])return;
    h+='<div class="col"><div class="ch" style="color:#58a6ff;border-color:#58a6ff;">👥 '+tm+' <span class="cnt">('+teams[tm].length+')</span></div><div class="cc">';
    teams[tm].forEach(function(a){
      h+='<div class="ac"><div class="at"><span class="ae">'+a.emoji+'</span><span class="ast" style="background:'+(a.status==='active'?'#238636':'#30363d')+';color:'+(a.status==='active'?'#fff':'#8b949e')+';">'+(a.status==='active'?'Active':'Idle')+'</span></div>'+
      '<div class="an">'+a.name+'</div><div class="at2">'+a.title+'</div><div class="ar2">'+a.role+'</div></div>';
    });
    h+='</div></div>';
  });
  b.innerHTML=h;
}

/* ─── DETAIL PANELS ─── */
function openTD(id){
  var t=(D.tickets||[]).find(function(x){return x.id===id});
  if(!t)return;
  var epic=t.epicId?(D.epics||[]).find(function(e){return e.id===t.epicId}):null;
  var blk=t.blockedBy?(D.tickets||[]).find(function(x){return x.id===t.blockedBy}):null;
  document.getElementById('dtitle').textContent=t.id+' — '+t.title;
  var h='';
  h+='<div class="ds"><div class="di">'+t.id+(epic?' · <span style="color:#1f6feb">⬆ '+epic.id+': '+epic.title+'</span>':'')+'</div><div class="dt">'+t.title+'</div></div>';
  h+='<div class="ds"><div class="dl">Description</div><div class="dd">'+(t.description||'No description')+'</div></div>';
  h+='<div class="dr"><div class="dc"><div class="dl">Status</div><select class="ss" onchange="uStatus(\''+t.id+'\',this.value)"><option value="backlog"'+(t.status==='backlog'?' selected':'')+'>Backlog</option><option value="in_progress"'+(t.status==='in_progress'?' selected':'')+'>In Progress</option><option value="review"'+(t.status==='review'?' selected':'')+'>Review</option><option value="done"'+(t.status==='done'?' selected':'')+'>Done</option></select></div>';
  h+='<div class="dc"><div class="dl">Assignee</div><input class="as" value="'+(t.assigned_to||'')+'" placeholder="Assign to..." onchange="uAssign(\''+t.id+'\',this.value)"></div></div>';
  h+='<div class="dr"><div class="dc"><div class="dl">Severity</div><span class="badge '+(t.severity||'').toLowerCase()+'">'+(t.severity||'')+'</span></div><div class="dc"><div class="dl">Category</div><span class="badge '+(t.category||'bug')+'">'+(t.category||'bug')+'</span></div><div class="dc"><div class="dl">Team</div><span style="font-size:10px;color:#484f58">'+(t.team||'—')+'</span></div></div>';
  if(blk)h+='<div class="ds"><div class="dl">⛔ Blocked By</div><div class="bi" style="cursor:pointer;color:#6e40c9" onclick="openTD(\''+blk.id+'\')">'+blk.id+': '+blk.title+'</div></div>';
  if(t.blocks)h+='<div class="ds"><div class="dl">Blocks</div><div class="bi">'+t.blocks+'</div></div>';
  h+='<div class="ds"><div class="dl">Comments</div>'+(t.comments&&t.comments.length?t.comments.map(function(c){return '<div class="cm"><span class="cm-by">'+c.by+':</span> '+c.text+'</div>'}).join(''):'<div style="color:#30363d;font-size:9px">No comments</div>')+'</div>';
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}

function openED(id){
  var e=(D.epics||[]).find(function(x){return x.id===id});
  if(!e)return;
  var st=(D.tickets||[]).filter(function(t){return t.epicId===e.id});
  var dn=st.filter(function(s){return s.status==='done'}).length;
  var pct=st.length?Math.round(dn/st.length*100):0;
  document.getElementById('dtitle').textContent=e.id+' — EPIC';
  var h='';
  h+='<div class="ds"><div class="di" style="color:#1f6feb">'+e.id+' · EPIC</div><div class="dt">'+e.title+'</div></div>';
  h+='<div class="ds"><div class="dl">Description</div><div class="dd">'+(e.description||'No description')+'</div></div>';
  h+='<div class="ds"><div class="dl">Progress</div><div class="ep" style="height:5px"><div class="epb '+(e.priority||'medium')+'" style="width:'+pct+'%"></div></div><div class="pd" style="margin-top:3px">'+pct+'% ('+dn+'/'+st.length+' stories done)</div></div>';
  h+='<div class="dr"><div class="dc"><div class="dl">Priority</div><span class="badge '+(e.priority||'')+'">'+(e.priority||'')+'</span></div><div class="dc"><div class="dl">Team</div><span style="font-size:10px">'+(e.team||'—')+'</span></div><div class="dc"><div class="dl">Assignee</div><span style="font-size:10px">'+(e.assignee||'Unassigned')+'</span></div></div>';
  h+='<div class="ds"><div class="dl">Linked Stories ('+st.length+')</div>'+st.map(function(s){return '<div class="si" style="cursor:pointer" onclick="openTD(\''+s.id+'\')"><span class="sd '+s.status+'"></span><span style="font-family:monospace;font-size:8px;color:#1f6feb">'+s.id+'</span> '+s.title+(s.blockedBy?' <span class="badge bl" style="font-size:6px">BLOCKED</span>':'')+'</div>'}).join('')+'</div>';
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}

function closeDetail(){document.getElementById('dp').classList.remove('op')}
function uStatus(id,s){var t=D.tickets.find(function(x){return x.id===id});if(t){t.status=s;t.updatedAt=(new Date()).toISOString();recalc();render()}}
function uAssign(id,a){var t=D.tickets.find(function(x){return x.id===id});if(t){t.assigned_to=a;t.updatedAt=(new Date()).toISOString()}}

function rStats(){
  var s=D.stats||{};
  document.getElementById('stats').innerHTML=
    '<span class="stat c">Critical: '+(s.critical||0)+'</span>'+
    '<span class="stat b">Blocked: '+(s.blocked||0)+'</span>'+
    '<span class="stat">Backlog: '+(s.backlog||0)+'</span>'+
    '<span class="stat i">In Progress: '+(s.in_progress||0)+'</span>'+
    '<span class="stat">Review: '+(s.review||0)+'</span>'+
    '<span class="stat d">Done: '+(s.done||0)+'</span>'+
    '<span class="stat" style="background:#1f6feb">Epics: '+(D.epics||[]).length+'</span>';
}

document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDetail()});
loadData();
setInterval(loadData,30000);
</script>
</body>
</html>

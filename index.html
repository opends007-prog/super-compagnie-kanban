<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>💎 Super Compagnie — Mission Control</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   MISSION CONTROL — Super Compagnie Kanban Board
   Mobile-first responsive design with dark theme
   ═══════════════════════════════════════════════════════════════ */
:root {
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2332;--bg4:#243044;
  --border:#1e2d3d;--border2:#2a3f54;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --blue:#3b82f6;--blue2:#2563eb;--cyan:#06b6d4;
  --green:#22c55e;--green2:#16a34a;
  --orange:#f59e0b;--orange2:#d97706;
  --red:#ef4444;--red2:#dc2626;
  --purple:#a855f7;--purple2:#9333ea;
  --pink:#ec4899;--yellow:#eab308;
  --radius:8px;--radius2:12px;--radius3:16px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow2:0 8px 32px rgba(0,0,0,.5);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'SF Mono','Fira Code',monospace;
  --transition:all .2s ease;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;height:100dvh;
  overflow:hidden;overscroll-behavior:none;
}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  font-size:14px;line-height:1.5;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;
  display:flex;flex-direction:column;
}
a{color:var(--blue);text-decoration:none}

/* ═══ SCROLLBARS ═══ */
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ═══ HEADER ═══ */
.hdr{
  background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);
  border-bottom:1px solid var(--border);
  padding:8px 16px;padding-top:max(8px,env(safe-area-inset-top));
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;gap:8px;z-index:100;position:relative;
}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan),var(--green),var(--orange),var(--purple));animation:shimmer 3s linear infinite;background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.hdr-left{display:flex;align-items:center;gap:10px;min-width:0}
.logo{font-size:20px;animation:pulse 2s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hdr h1{
  font-size:16px;font-weight:700;
  background:linear-gradient(90deg,var(--blue),var(--cyan));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;white-space:nowrap;overflow:hidden;
  text-overflow:ellipsis;max-width:180px;
}
.hdr-badges{display:flex;gap:6px;flex-wrap:wrap;flex-shrink:0}
.badge{display:inline-flex;align-items:center;gap:3px;padding:4px 10px;border-radius:10px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;min-height:24px}
.badge-live{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.badge-live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.badge-count{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.hdr-right{display:flex;gap:6px;align-items:center;flex-shrink:0}
.now-working{display:flex;flex-wrap:wrap;gap:6px;align-items:center;padding:4px 10px;font-size:11px}
.nw-label{color:var(--text2);font-weight:600}
.nw-idle{color:var(--text3);font-size:11px;padding:4px 10px}
.nw-chip{background:var(--bg4);border:1px solid var(--border);border-radius:12px;padding:2px 8px;cursor:pointer;color:var(--text)}
.nw-chip:hover{border-color:var(--blue)}
.nw-ev{color:var(--blue);font-size:9px}
.dlv-content{background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:8px;font-size:10px;max-height:240px;overflow:auto;white-space:pre-wrap;color:var(--text2)}
.dlv{font-size:10px;color:#22c55e;margin-top:4px}
.btn{
  display:inline-flex;align-items:center;gap:4px;
  padding:8px 14px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text);font-size:12px;font-weight:600;
  cursor:pointer;transition:var(--transition);white-space:nowrap;
  min-height:36px;
}
.btn:active{background:var(--bg4);transform:scale(.97)}
.btn-pri{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.btn-pri:active{background:linear-gradient(135deg,var(--blue2),var(--blue));transform:scale(.97)}
.btn-icon{padding:8px;border-radius:var(--radius);min-width:36px;justify-content:center}
.jira-link{font-size:10px;padding:8px 10px}
.jira-text{display:inline}

/* ═══ VIEW TABS ═══ */
.tabs{
  display:flex;gap:2px;padding:6px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;
  -webkit-overflow-scrolling:touch;scrollbar-width:none;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  display:inline-flex;align-items:center;gap:4px;
  padding:8px 16px;border-radius:var(--radius);
  border:none;background:transparent;color:var(--text3);
  font-size:12px;font-weight:600;cursor:pointer;
  transition:var(--transition);white-space:nowrap;
  min-height:36px;position:relative;
}
.tab:active{color:var(--text);background:var(--bg3)}
.tab.active{color:var(--text);background:var(--bg4);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tab.active::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:20px;height:2px;border-radius:1px;background:var(--blue)}
.tab .num{font-size:9px;padding:1px 5px;border-radius:6px;background:var(--bg4);color:var(--text3)}
.tab.active .num{background:var(--blue);color:#fff}

/* ═══ BOARD MODE FILTER (All / Epics / Stories) ═══ */
.board-mode{
  display:flex;gap:4px;padding:6px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);
  flex-shrink:0;align-items:center;
}
.board-mode-label{font-size:10px;color:var(--text3);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-right:4px}
.bmode-btn{
  display:inline-flex;align-items:center;gap:3px;
  padding:4px 12px;border-radius:16px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text3);font-size:10px;font-weight:600;
  cursor:pointer;white-space:nowrap;min-height:28px;
  transition:var(--transition);
}
.bmode-btn:active{background:var(--bg4)}
.bmode-btn.active{background:var(--bg4);color:var(--text);border-color:var(--blue);box-shadow:0 0 0 1px var(--blue)}

/* ═══ COLUMN PICKER (mobile) ═══ */
.col-picker{
  display:none;
  padding:8px 12px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
  overflow-x:auto;
  -webkit-overflow-scrolling:touch;
  gap:6px;
  scrollbar-width:none;
}
.col-picker::-webkit-scrollbar{display:none}
.col-pick{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:20px;
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text3);font-size:11px;font-weight:600;
  cursor:pointer;white-space:nowrap;
  min-height:36px;transition:var(--transition);
}
.col-pick:active{background:var(--bg4)}
.col-pick.active{
  background:var(--bg4);color:var(--text);
  border-color:var(--blue);box-shadow:0 0 0 1px var(--blue);
}
.col-pick-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.col-pick-cnt{font-size:9px;color:var(--text3)}

/* ═══ COLUMN DOTS (mobile) ═══ */
.col-dots{
  display:none;
  justify-content:center;gap:6px;
  padding:6px 12px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  flex-shrink:0;
}
.col-dot-ind{
  width:8px;height:8px;border-radius:50%;
  background:var(--border2);transition:var(--transition);
}
.col-dot-ind.active{background:var(--blue);transform:scale(1.3)}

/* ═══ MAIN ═══ */
.main{display:flex;flex:1;overflow:hidden;position:relative;min-height:0}

/* ═══ BOARD VIEW (desktop: horizontal scroll) ═══ */
.board{
  display:flex;gap:10px;padding:12px;
  overflow-x:auto;overflow-y:hidden;
  flex:1;align-items:flex-start;
  -webkit-overflow-scrolling:touch;
}
.col{
  min-width:280px;max-width:340px;flex:0 0 auto;
  background:var(--bg2);border-radius:var(--radius2);
  border:1px solid var(--border);
  display:flex;flex-direction:column;
  height:100%;transition:var(--transition);
}
.col:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.col-hdr{
  padding:10px 12px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
  flex-shrink:0;
}
.col-title{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.col-dot{width:10px;height:10px;border-radius:50%}
.col-cnt{font-size:10px;padding:2px 7px;border-radius:8px;background:var(--bg4);color:var(--text3);font-weight:600}
.col-body{flex:1;overflow-y:auto;padding:8px;min-height:0;-webkit-overflow-scrolling:touch}

/* Column colors */
.col-backlog .col-dot{background:var(--text3)}.col-backlog .col-title{color:var(--text3)}
.col-planned .col-dot{background:var(--orange)}.col-planned .col-title{color:var(--orange)}
.col-progress .col-dot{background:var(--blue);animation:blink 1.5s ease-in-out infinite}.col-progress .col-title{color:var(--blue)}
.col-waiting .col-dot{background:var(--text3);opacity:.5}.col-waiting .col-title{color:var(--text3);opacity:.7}
.col-validation .col-dot{background:var(--cyan)}.col-validation .col-title{color:var(--cyan)}
.col-done .col-dot{background:var(--green)}.col-done .col-title{color:var(--green)}

/* ═══ STORY CARD ═══ */
.tk{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px;
  margin-bottom:5px;cursor:pointer;
  transition:var(--transition);position:relative;
  min-height:44px;
}
.tk:active{border-color:var(--border2);background:var(--bg4);transform:scale(.98)}
.tk.blocked{opacity:.5;border-color:var(--red)}
.tk.epic-child{margin-left:10px;border-left:2px solid var(--border2)}
.tk-top{display:flex;justify-content:space-between;align-items:flex-start;gap:6px}
.tk-id{font-family:var(--font-mono);font-size:9px;color:var(--text3);font-weight:600}
.tk-title{font-size:12px;font-weight:500;margin:4px 0;line-height:1.35}
.tk-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap}
.tk-tag{font-size:9px;padding:2px 6px;border-radius:5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.tag-c{background:var(--red);color:#fff}.tag-h{background:var(--orange);color:#fff}
.tag-m{background:var(--yellow);color:#000}.tag-l{background:var(--green);color:#fff}
.tag-infra{background:rgba(59,130,246,.2);color:var(--blue)}
.tag-feat{background:rgba(168,85,247,.2);color:var(--purple)}
.tag-bug{background:rgba(239,68,68,.2);color:var(--red)}
.tag-doc{background:rgba(6,182,212,.2);color:var(--cyan)}
.tag-agent{background:rgba(245,158,11,.2);color:var(--orange)}
.tag-team{background:rgba(34,197,94,.2);color:var(--green)}
.tag-ref{background:rgba(100,116,139,.2);color:var(--text3)}
.tag-research{background:rgba(168,85,247,.2);color:var(--purple)}
.tag-finance{background:rgba(234,179,8,.2);color:var(--yellow)}
.tag-security{background:rgba(239,68,68,.2);color:var(--red)}
.tk-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:6px}
.tk-asg{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2)}
.tk-asg-emoji{font-size:14px}
.tk-ep{font-family:var(--font-mono);font-size:9px;color:var(--blue)}
.tk-blocked-badge{font-size:8px;padding:2px 5px;border-radius:4px;background:rgba(239,68,68,.2);color:var(--red);font-weight:700}

/* Epic group */
.eg{margin-bottom:8px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.el{font-family:var(--font-mono);font-size:9px;color:var(--blue);padding:8px 10px;cursor:pointer;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;min-height:44px}
.el:active{background:var(--bg4)}
.ep-bar{height:3px;background:var(--bg4);overflow:hidden}
.ep-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s}

/* ═══ MOBILE SINGLE-COLUMN VIEW ═══ */
.board-mobile{
  display:none;
  flex:1;overflow:hidden;
  flex-direction:column;
}
.board-mobile-col{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;min-height:0;
}

/* ═══ DETAIL PANEL ═══ */
.dp{
  width:380px;background:var(--bg2);border-left:1px solid var(--border);
  display:none;flex-direction:column;flex-shrink:0;overflow:hidden;
}
.dp.op{display:flex}
.dp-hdr{
  padding:14px 16px;border-bottom:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;
}
.dp-hdr h2{font-size:14px;font-weight:600;line-height:1.3;word-break:break-word;padding-right:8px}
.dp-close{
  background:none;border:none;color:var(--text3);font-size:20px;
  cursor:pointer;padding:8px;border-radius:var(--radius);
  transition:var(--transition);min-width:44px;min-height:44px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.dp-close:active{background:var(--bg4);color:var(--text)}
.dp-body{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch}
.ds{margin-bottom:16px}
.ds-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:4px}
.ds-val{font-size:13px;line-height:1.4}
.ds-id{font-family:var(--font-mono);color:var(--blue);font-size:11px}
.ds-title{font-size:16px;font-weight:600;margin:6px 0;line-height:1.3}
.ds-desc{font-size:13px;color:var(--text);line-height:1.5;background:var(--bg);padding:10px;border-radius:6px;border:1px solid var(--border)}
.ds-select,.ds-input{
  width:100%;padding:8px 10px;border-radius:var(--radius);
  border:1px solid var(--border);background:var(--bg3);
  color:var(--text);font-size:13px;min-height:44px;
}
.ds-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.ds-col{flex:1;min-width:100px}
.cm{padding:8px;border-radius:5px;border:1px solid var(--border);margin-bottom:5px;font-size:12px}
.cm-by{font-weight:600;color:var(--blue);font-size:10px}
.cm-time{font-size:9px;color:var(--text3);margin-left:4px}
.cm-add{margin-top:8px;display:flex;flex-direction:column;gap:6px}
.cm-btn{background:var(--blue);color:#fff;border:none;border-radius:5px;padding:6px 12px;font-size:10px;font-weight:700;cursor:pointer;align-self:flex-end;min-height:32px}
.cm-btn:active{background:var(--blue2)}
.bi{font-size:11px;color:red;padding:4px 0;cursor:pointer;min-height:32px;display:flex;align-items:center}
.si{
  font-size:11px;padding:6px 4px;
  display:flex;align-items:center;gap:6px;
  cursor:pointer;border-radius:4px;min-height:36px;
}
.si:active{background:var(--bg3)}
.sd{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sd.done{background:var(--green)}.sd.in_progress{background:var(--blue)}
.sd.backlog{background:var(--border2)}.sd.in_validation{background:var(--cyan)}
.sd.planned{background:var(--orange)}.sd.waiting{background:var(--border2)}
.sd.blocked{background:var(--red)}
.pd{font-size:12px;font-weight:600}
.progress{height:5px;background:var(--bg4);border-radius:3px;margin:6px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s}

/* ═══ LIST VIEW ═══ */
.lv{flex:1;overflow:auto;padding:12px;display:none;min-height:0;-webkit-overflow-scrolling:touch}
.lv-table{width:100%;border-collapse:collapse;font-size:12px}
.lv-th{
  text-align:left;padding:8px 10px;background:var(--bg2);
  border-bottom:1px solid var(--border);color:var(--text3);
  font-weight:600;text-transform:uppercase;font-size:10px;
  letter-spacing:.5px;position:sticky;top:0;z-index:1;
}
.lv-tr:active{background:var(--bg2)}
.lv-td{padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
.lv-key{font-family:var(--font-mono);color:var(--blue);font-size:10px}
.lv-title{color:var(--text);font-weight:500}
.lv-asg{color:var(--text2)}.lv-ep{font-family:var(--font-mono);color:var(--blue);font-size:9px}
.lv-status{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.lv-status.done{color:var(--green)}.lv-status.in_progress{color:var(--blue)}
.lv-status.in_validation{color:var(--cyan)}.lv-status.backlog{color:var(--text3)}
.lv-status.planned{color:var(--orange)}.lv-status.waiting{color:var(--text3)}
.lv-tr:hover{background:var(--bg3)}

/* Progress bar in list view */
.lv-progress{width:80px}
.lv-progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden;margin-bottom:2px}
.lv-progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s}
.lv-progress-text{font-size:9px;color:var(--text3);font-weight:600}

/* Mobile list cards */
.lv-cards{display:none}
.lv-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px;margin-bottom:5px;
  cursor:pointer;min-height:44px;
}
.lv-card:active{border-color:var(--border2);background:var(--bg4)}
.lv-card-key{font-family:var(--font-mono);color:var(--blue);font-size:10px}
.lv-card-title{font-size:12px;font-weight:500;margin:3px 0}
.lv-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;font-size:10px;color:var(--text3)}

/* ═══ BACKLOG VIEW ═══ */
.bg-view{flex:1;overflow:auto;padding:12px;display:none;min-height:0;-webkit-overflow-scrolling:touch}
.bg-section{margin-bottom:18px}
.bg-sh{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.bg-item{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:10px;margin-bottom:4px;
  cursor:pointer;min-height:44px;
}
.bg-item:active{border-color:var(--border2)}
.bg-title{font-size:12px;font-weight:500;color:var(--text)}
.bg-meta{display:flex;gap:6px;margin-top:4px;align-items:center;font-size:10px;color:var(--text3);flex-wrap:wrap}

/* ═══ ACTIVITY VIEW ═══ */
.activity-view{flex:1;overflow:auto;padding:12px;display:none;min-height:0;-webkit-overflow-scrolling:touch}
.activity-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;gap:8px;flex-wrap:wrap}
.activity-title{font-size:14px;font-weight:600;color:var(--text)}
.activity-controls{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.activity-filter{padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11px;min-height:28px}
.activity-filter:focus{border-color:var(--blue);outline:none}
.activity-btn{padding:4px 10px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11px;cursor:pointer;min-height:28px;transition:var(--transition)}
.activity-btn:hover{background:var(--bg4)}
.activity-btn.paused{background:var(--orange);color:#000;border-color:var(--orange)}
.activity-list{display:flex;flex-direction:column;gap:4px}
.activity-item{display:flex;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:var(--radius);border:1px solid var(--border);transition:var(--transition);cursor:pointer}
.activity-item:hover{border-color:var(--border2);background:var(--bg4)}
.activity-item.new{animation:fadeIn .3s ease}
.activity-avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--bg4)}
.activity-content{flex:1;min-width:0}
.activity-meta{display:flex;gap:8px;align-items:center;margin-bottom:2px}
.activity-agent{font-size:11px;font-weight:600;color:var(--blue)}
.activity-time{font-size:10px;color:var(--text3);font-family:var(--font-mono)}
.activity-type{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;text-transform:uppercase}
.activity-type.jira_update{background:rgba(59,130,246,.2);color:var(--blue)}
.activity-type.status_change{background:rgba(34,197,94,.2);color:var(--green)}
.activity-type.comment{background:rgba(245,158,11,.2);color:var(--orange)}
.activity-type.assignment{background:rgba(168,85,247,.2);color:var(--purple)}
.activity-type.system{background:rgba(100,116,139,.2);color:var(--text3)}
.activity-text{font-size:12px;color:var(--text);line-height:1.3}
.activity-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:200px;color:var(--text3);font-size:12px;gap:8px}
.activity-empty-icon{font-size:32px;opacity:.5}
.activity-stats{font-size:10px;color:var(--text3);font-family:var(--font-mono)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:768px){
  .activity-hdr{flex-direction:column;align-items:stretch}
  .activity-controls{justify-content:space-between}
  .activity-filter{flex:1}
}

/* ═══ TEAM VIEW ═══ */
.team-view{flex:1;overflow:auto;padding:12px;display:none;min-height:0;-webkit-overflow-scrolling:touch}
.team-section{margin-bottom:18px}
.team-sh{font-size:13px;font-weight:600;color:var(--blue);margin-bottom:10px;padding-bottom:4px;border-bottom:1px solid var(--border)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.agent-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--radius);padding:12px;transition:var(--transition);
  cursor:pointer;
}
.agent-card:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.agent-card:active{transform:scale(.98)}
.agent-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.agent-emoji{font-size:24px}
.agent-status{font-size:9px;padding:2px 7px;border-radius:7px;font-weight:700}
.agent-status.active{background:rgba(34,197,94,.2);color:var(--green)}
.agent-status.idle{background:var(--bg4);color:var(--text3)}
.agent-name{font-size:14px;font-weight:600;color:var(--text)}
.agent-title{font-size:11px;color:var(--blue);margin-top:2px;font-weight:500}
.agent-role{font-size:10px;color:var(--text3);margin-top:4px;line-height:1.4}
.agent-status-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:10px;font-size:9px;
  font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:5px;
}
.agent-status-badge.idle{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.agent-status-badge.working{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.agent-status-badge.not-active{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.agent-status-badge.troubleshooting{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid rgba(245,158,11,.3)}
.agent-progress{margin-top:8px}
.progress-bar{height:5px;background:var(--bg4);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s}
.progress-text{font-size:9px;color:var(--text3);margin-top:3px;font-family:var(--font-mono)}
.agent-ticket-list{margin-top:5px;border-top:1px solid var(--border);padding-top:4px}
.agent-ticket-item{font-size:9px;color:var(--text2);padding:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-no-tickets{color:var(--text3);font-size:10px;margin-top:5px;font-style:italic}
.agent-tickets{font-size:10px;color:var(--text2);margin-top:5px;font-family:var(--font-mono)}

/* ═══ NOTIFICATIONS ═══ */
.notif{
  position:fixed;bottom:16px;right:16px;left:16px;
  padding:12px 16px;border-radius:var(--radius);
  background:var(--bg3);border:1px solid var(--border);
  box-shadow:var(--shadow2);font-size:13px;z-index:1000;
  animation:slideIn .3s ease;text-align:center;
}
.notif.success{border-left:3px solid var(--green)}
.notif.error{border-left:3px solid var(--red)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ═══ LOADING ═══ */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:13px}
.loading::after{content:'';width:24px;height:24px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:10px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ EMPTY STATE ═══ */
.empty{display:flex;align-items:center;justify-content:center;height:60px;color:var(--text3);font-size:11px;text-align:center;padding:10px}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:120px;color:var(--text3);font-size:13px;text-align:center;padding:20px;gap:8px}
.empty-state .empty-icon{font-size:32px;opacity:.5}
.empty-state .empty-text{color:var(--text3);font-size:12px;line-height:1.4}
.empty-state .empty-hint{color:var(--text3);font-size:10px;opacity:.7}

/* ═══ THEME TOGGLE ═══ */
.theme-btn{background:none;border:1px solid var(--border);border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;transition:var(--transition)}
.theme-btn:active{transform:scale(.9);background:var(--bg4)}

/* ═══ PULL TO REFRESH ═══ */
.ptr-indicator{display:none;justify-content:center;align-items:center;gap:8px;padding:8px;color:var(--text3);font-size:11px;background:var(--bg2);flex-shrink:0}
.ptr-indicator.visible{display:flex}
.ptr-indicator .ptr-arrow{transition:transform .2s}
.ptr-indicator.ptr-ready .ptr-arrow{transform:rotate(180deg)}
.ptr-indicator.ptr-loading .ptr-arrow{animation:spin .6s linear infinite}

/* ═══ OFFLINE BANNER ═══ */
.offline-banner{display:none;background:var(--orange);color:#000;padding:8px 16px;text-align:center;font-size:12px;font-weight:600;flex-shrink:0;z-index:101}
.offline-banner.visible{display:flex;align-items:center;justify-content:center;gap:6px}

/* ═══ LIGHT THEME ═══ */
body.light{--bg:#f8fafc;--bg2:#ffffff;--bg3:#f1f5f9;--bg4:#e2e8f0;--border:#e2e8f0;--border2:#cbd5e1;--text:#0f172a;--text2:#475569;--text3:#94a3b8}
.light .hdr{background:linear-gradient(135deg,#fff 0%,#f8fafc 100%)}
.light .col,.light .dp,.light .agent-card,.light .lv-card,.light .bg-item,.light .tk,.light .ds-desc,.light .cm,.light .eg{background:var(--bg3)}
.light .tk:hover{border-color:var(--border2)}

/* ═══════════════════════════════════════════════════════════════

/* ═══ OFFICE VIEW ═══ */
.office-view{
  flex:1;display:none;min-height:0;overflow:hidden;
  position:relative;background:#0d1117;
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:50;
}
.office-view.active{display:flex}
#office-canvas{
  display:block;width:100%;height:100%;
  image-rendering:pixelated;image-rendering:crisp-edges;
}

/* ═══════════════════════════════════════════════════════════════
   RESPONSIVE — TABLET & MOBILE
   ═══════════════════════════════════════════════════════════════ */
@media(max-width:768px){
  .hdr{padding:6px 10px}
  .hdr h1{font-size:14px;max-width:120px}
  .hdr-badges{display:none}
  .btn{padding:6px 10px;font-size:11px;min-height:36px}
  .jira-text{display:none}
  .tabs{padding:4px 8px}
  .tab{padding:6px 12px;font-size:11px;min-height:36px}
  .board-mode-label{display:none}

  /* Switch to mobile single-column board */
  .board{display:none !important}
  .board-mobile{display:flex !important}
  .col-picker{display:flex !important}
  .col-dots{display:flex !important}

  /* Mobile detail panel: full-screen bottom sheet */
  .dp{
    position:fixed;top:0;right:0;bottom:0;
    width:100%;height:100%;height:100dvh;
    z-index:200;border-left:none;
    box-shadow:var(--shadow2);
    transform:translateY(100%);transition:transform .3s ease;
  }
  .dp.op{transform:translateY(0)}
  .dp::before{
    content:'';display:block;width:40px;height:4px;
    background:var(--border2);border-radius:2px;
    margin:8px auto 0;flex-shrink:0;
  }
  .dp-hdr{padding-top:4px}

  .team-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}

  /* Mobile list: card view instead of table */
  .lv-table{display:none}
  .lv-cards{display:block}

  .notif{left:12px;right:12px;bottom:12px}
}

@media(max-width:480px){
  .hdr-left{gap:6px}
  .logo{font-size:18px}
  .hdr h1{font-size:12px;max-width:90px}
  .tab{padding:5px 8px;font-size:10px}
  .col-pick{padding:6px 10px;font-size:10px}
  .team-grid{grid-template-columns:1fr}
}

@media(min-width:769px){
  .board{display:flex !important}
  .board-mobile{display:none !important}
  .col-picker{display:none !important}
  .col-dots{display:none !important}
}
</style>
</head>
<body>

<!-- ═══ HEADER ═══ -->
<div class="hdr">
  <div class="hdr-left">
    <span class="logo">💎</span>
    <h1>Mission Control</h1>
    <div class="hdr-badges">
      <span class="badge badge-live">● LIVE</span>
      <span class="badge badge-count" id="badge-epics">0 Epics</span>
      <span class="badge badge-count" id="badge-stories">0 Stories</span>
      <span class="badge badge-count" id="badge-active">0 Active</span>
    </div>
  </div>
  <div class="hdr-right">
    <a class="btn jira-link" href="https://opends007.atlassian.net/jira/software/projects/TD/boards/2" target="_blank" rel="noopener">📋 <span class="jira-text">Jira →</span></a>
    <button class="btn btn-icon" onclick="toggleFullscreen()" title="Fullscreen" aria-label="Fullscreen">⛶</button>
    <button class="btn btn-pri" onclick="loadData()">↻ Sync</button>
    <button class="btn" onclick="hardRefresh()" title="Reload the latest app version (clears cached code)">⟳ Update</button>
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="Toggle theme" aria-label="Toggle theme">🌙</button>
  </div>
</div>

<!-- ═══ TABS ═══ -->
<div class="tabs">
  <button class="tab active" id="tab-kanban" onclick="goView('kanban')">📊 Board</button>
  <button class="tab" id="tab-list" onclick="goView('list')">📝 List</button>
  <button class="tab" id="tab-backlog" onclick="goView('backlog')">📦 Backlog</button>
  <button class="tab" id="tab-team" onclick="goView('team')">👥 Team <span class="num" id="badge-team-count">0</span></button>
  <button class="tab" id="tab-activity" onclick="goView('activity')">⚡ Activity <span class="num" id="activity-count">0</span></button>
  <button class="tab" id="tab-office" onclick="goView('office')">🏢 Office</button>
</div>

<!-- ═══ BOARD MODE FILTER (All / Epics / Stories) ═══ -->
<div class="board-mode" id="boardModeFilter">
  <span class="board-mode-label">Show:</span>
  <button class="bmode-btn active" id="bmode-all" onclick="setBoardMode('all')">📋 All</button>
  <button class="bmode-btn" id="bmode-epics" onclick="setBoardMode('epics')">📁 Epics</button>
  <button class="bmode-btn" id="bmode-stories" onclick="setBoardMode('stories')">📖 Stories</button>
</div>
<div id="nowWorking" class="now-working"></div>

<!-- ═══ OFFLINE BANNER ═══ -->
<div class="offline-banner" id="offlineBanner">📡 You are offline — data may be stale</div>

<!-- ═══ PULL TO REFRESH (mobile) ═══ -->
<div class="ptr-indicator" id="ptrIndicator"><span class="ptr-arrow">↻</span> <span id="ptrText">Pull to refresh</span></div>

<!-- ═══ COLUMN PICKER (mobile) ═══ -->
<div class="col-picker" id="colPicker"></div>
<div class="col-dots" id="colDots"></div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <!-- Board View (desktop: multi-column scroll) -->
  <div id="view-kanban" class="board"></div>
  <!-- Board View (mobile: single column) -->
  <div id="view-kanban-mobile" class="board-mobile"></div>
  <!-- List View -->
  <div id="view-list" class="lv"></div>
  <!-- Backlog View -->
  <div id="view-backlog" class="bg-view"></div>
  <!-- Team View -->
  <div id="view-team" class="team-view"></div>
  <!-- Activity View -->
  <div id="view-activity" class="activity-view"></div>
	<!-- Office View -->
	<div id="view-office" class="office-view"><canvas id="office-canvas"></canvas></div>
  <!-- Detail Panel -->
  <div class="dp" id="dp">
    <div class="dp-hdr"><h2 id="dtitle">Detail</h2><button class="dp-close" onclick="closeDetail()" aria-label="Close">✕</button></div>
    <div class="dp-body" id="db"></div>
  </div>
</div>

<script>
var D={epics:[],tickets:[],stats:{}};
var LOGS={tickets:{},active:[]};
var CV='kanban';
var mobileColIdx=0;
var boardMode='all'; // 'all' | 'epics' | 'stories'

// Column = Status. Stories appear in the column matching their status.
var COL_ORDER=['backlog','planned','in_progress','waiting','in_validation','done'];
var COL_NAMES={backlog:'📦 Backlog',planned:'📌 Planned',in_progress:'🔧 In Progress',waiting:'⏳ Waiting for Support',in_validation:'🔍 In Validation',done:'✅ Done'};
var COL_DOTS={backlog:'#64748b',planned:'#f59e0b',in_progress:'#3b82f6',waiting:'#64748b',in_validation:'#06b6d4',done:'#22c55e'};

function hardRefresh(){
  // Force a fresh fetch of index.html + JS — busts the cached app code on phones/home-screen apps.
  try{showNotif('Updating to latest version…','success');}catch(e){}
  location.replace(location.origin+location.pathname+'?v='+Date.now());
}
function loadData(){
  fetch('agent-logs.json?t='+Date.now()).then(function(r){return r.json();}).then(function(l){LOGS=l||LOGS;renderActive();}).catch(function(){});
  fetch('tickets.json?t='+Date.now())
    .then(r=>r.json())
    .then(d=>{
      D=d;
      console.log('Loaded:',D.epics.length,'epics,',D.tickets.length,'stories,',(D.agents||[]).length,'agents');
      recalc();
      render();
      if(CV==='activity'){activityLoadHistory();}
      showNotif('Data synced: '+D.tickets.length+' stories, '+(D.agents||[]).length+' agents','success');
    })
    .catch(e=>{console.error(e);showNotif('Sync failed','error');});
}

function recalc(){
  var tk=D.tickets||[],ep=D.epics||[];
  ep.forEach(function(e){
    var st=tk.filter(function(t){return t.epicId===e.id});
    if(!st.length){e.progress=0;e.status='backlog';return}
    var dn=st.filter(function(s){return s.status==='done'}).length;
    var active=st.filter(function(s){return s.status in {in_progress:1,waiting:1,in_validation:1,planned:1}}).length;
    e.progress=Math.round(dn/st.length*100);
    e.status=(dn===st.length)?'done':(active>0)?'in_progress':'backlog';
  });
}

function goView(v){
  CV=v;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('tab-'+v).classList.add('active');
  ['kanban','list','backlog','team','activity','office'].forEach(function(view){
    var el=document.getElementById('view-'+view);
    if(el){
      if(view==='kanban'){el.style.display=(v===view)?'flex':'none';}
      else if(view==='office'){el.style.display=(v===view)?'flex':'none';}
      else{el.style.display=(v===view)?'block':'none';}
    }
  });
  var km=document.getElementById('view-kanban-mobile');
  if(km){km.style.display=(v==='kanban')?'flex':'none';}
  var picker=document.getElementById('colPicker');
  var dots=document.getElementById('colDots');
  if(picker){picker.style.display=(v==='kanban')?'flex':'none';}
  if(dots){dots.style.display=(v==='kanban')?'flex':'none';}
  // Show/hide board mode filter
  var bm=document.getElementById('boardModeFilter');
  if(bm){bm.style.display=(v==='kanban')?'flex':'none';}
  // Office view: hide header, board mode, badges, tabs — full screen canvas
  var hdr=document.querySelector('.hdr');
  if(hdr){hdr.style.display=(v==='office')?'none':'flex';}
  var tabs=document.querySelector('.tabs');
  if(tabs){tabs.style.display=(v==='office')?'none':'flex';}
  // Office view: start/stop animation loop
  if(v==='office'&&typeof officeInit==='function'){officeInit(document.getElementById('office-canvas'));}
  else if(typeof officeDestroy==='function'){officeDestroy();}
  closeDetail();
  render();
  if(v==='activity'){startActivityStream();}else{stopActivityStream();}
}

function setBoardMode(mode){
  boardMode=mode;
  document.querySelectorAll('.bmode-btn').forEach(function(b){b.classList.remove('active')});
  document.getElementById('bmode-'+mode).classList.add('active');
  render();
}

function render(){
  try{
    if(CV==='kanban'){rBoard();rBoardMobile();}
    else if(CV==='list'){rList();}
    else if(CV==='backlog'){rBacklog();}
    else if(CV==='team'){rTeam();}
    else if(CV==='office'&&typeof officeRefresh==='function'){officeRefresh(D);}
    rStats();
  }catch(e){
    console.error('Render error:',e);
    showNotif('Render error: '+e.message,'error');
  }
}

function renderActive(){
  var el=document.getElementById('nowWorking'); if(!el)return;
  var a=(LOGS&&LOGS.active)||[];
  if(!a.length){el.innerHTML='<span class="nw-idle">💤 No agents working right now (they work in bursts when the executor runs)</span>';return;}
  el.innerHTML='<span class="nw-label">🟢 Working now:</span>'+a.map(function(x){
    return '<span class="nw-chip" onclick="openAgent(\''+(x.agent||'')+'\')">'+(agentEmoji(x.agent)||'🤖')+' '+agentName(x.agent)+(x.ticket?' · '+x.ticket:'')+' <span class="nw-ev">'+(x.event||'')+'</span></span>';
  }).join('');
}
function openAgent(name){
  if(!name)return;
  var rows=[];
  Object.keys((LOGS&&LOGS.tickets)||{}).forEach(function(tid){
    var L=LOGS.tickets[tid]; if(L.agent===name) rows.push({ticket:tid,status:L.status,events:L.events,deliverable:L.deliverable});
  });
  document.getElementById('dtitle').textContent=(agentEmoji(name)||'🤖')+' '+agentName(name)+' — activity';
  var h='<div class="ds"><div class="ds-label">Agent</div><div class="ds-title">'+agentName(name)+'</div><div style="color:var(--text3);font-size:10px">'+rows.length+' ticket(s) with logged work</div></div>';
  if(!rows.length)h+='<div style="color:var(--text3);font-size:11px">No logged work yet for this agent.</div>';
  rows.forEach(function(r){
    h+='<div class="ds"><div class="ds-id" style="cursor:pointer" onclick="openTD(\''+r.ticket+'\')">'+r.ticket+' · '+(r.status||'')+'</div>';
    (r.events||[]).slice(-6).forEach(function(e){h+='<div class="cm"><span class="cm-by">'+(e.event||'')+':</span> '+(e.content||'')+'<span class="cm-time">'+(e.ts?formatTime(e.ts):'')+'</span></div>';});
    if(r.deliverable)h+='<div class="dlv">📎 '+r.deliverable.file+' ('+r.deliverable.size+' b)</div>';
    h+='</div>';
  });
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}
function rStats(){
  var tk=D.tickets||[],ep=D.epics||[],ag=D.agents||[];
  var active=tk.filter(function(t){return t.status in {in_progress:1,waiting:1,in_validation:1,planned:1}}).length;
  var working=ag.filter(function(a){return a.status==='working'}).length;
  document.getElementById('badge-epics').textContent=ep.length+' Epics';
  document.getElementById('badge-stories').textContent=tk.length+' Stories';
  document.getElementById('badge-active').textContent=active+' Active';
  var tc=document.getElementById('badge-team-count');
  if(tc)tc.textContent=ag.length;
}

/* ═══ BOARD VIEW (desktop: multi-column) ═══ */
function rBoard(){
  var ep=D.epics||[],tk=D.tickets||[];
  var ecm={};ep.forEach(function(e,i){ecm[e.id]=['#3b82f6','#a855f7','#f59e0b','#22c55e','#ef4444','#06b6d4','#ec4899','#eab308'][i%8]});
  var byEpic={};ep.forEach(function(e){byEpic[e.id]=[]});
  var orphans=[];
  tk.forEach(function(t){if(t.epicId&&byEpic[t.epicId])byEpic[t.epicId].push(t);else orphans.push(t)});

  var html='';
  COL_ORDER.forEach(function(s){
    var colName=COL_NAMES[s];
    var colClass='col-'+s;
    var epicsInCol=ep.filter(function(e){return e.status===s});
    var orphansInCol=orphans.filter(function(t){return t.status===s});
    var cnt;
    if(boardMode==='epics'){cnt=epicsInCol.length;}
    else if(boardMode==='stories'){cnt=tk.filter(function(t){return t.status===s}).length;}
    else{cnt=orphansInCol.length;epicsInCol.forEach(function(e){cnt+=(byEpic[e.id]||[]).filter(function(t){return t.status===s}).length;});}

    html+='<div class="col '+colClass+'"><div class="col-hdr"><div class="col-title"><span class="col-dot"></span>'+colName+'</div><span class="col-cnt">('+cnt+')</span></div><div class="col-body">';

    if(boardMode==='stories'){
      // Stories-only mode: show ALL stories flat (both orphans and epic children)
      var allStoriesInCol=[];
      orphans.forEach(function(t){if(t.status===s)allStoriesInCol.push({t:t,ec:null});});
      ep.forEach(function(e){
        var st=byEpic[e.id]||[];
        st.forEach(function(t){if(t.status===s)allStoriesInCol.push({t:t,ec:ecm[t.epicId]});});
      });
      allStoriesInCol.forEach(function(item){html+=tkHTML(item.t,item.ec);});
    } else if(boardMode==='epics'){
      // Epics-only mode: show epics without their child stories
      ep.forEach(function(e){
        if(e.status!==s)return;
        var st=byEpic[e.id]||[],dn=st.filter(function(x){return x.status==='done'}).length;
        html+='<div class="eg"><div class="el" onclick="openED(\''+e.id+'\')">⬆ '+e.id+': '+e.title+' <span style="color:var(--text3)">['+dn+'/'+st.length+']</span></div>';
        html+='<div class="ep-bar"><div class="ep-bar-fill"style="width:'+e.progress+'%"></div></div>';
        html+='</div>';
      });
    } else {
      // All mode: epics with their child stories nested
      ep.forEach(function(e){
        if(e.status!==s)return;
        var st=byEpic[e.id]||[],dn=st.filter(function(x){return x.status==='done'}).length;
        html+='<div class="eg"><div class="el" onclick="openED(\''+e.id+'\')">⬆ '+e.id+': '+e.title+' <span style="color:var(--text3)">['+dn+'/'+st.length+']</span></div>';
        html+='<div class="ep-bar"><div class="ep-bar-fill"style="width:'+e.progress+'%"></div></div>';
        st.forEach(function(t){if(t.status===s)html+=tkHTML(t,ecm[t.epicId]);});
        html+='</div>';
      });
      orphans.forEach(function(t){
        if(t.status===s)html+=tkHTML(t,null);
      });
    }

    if(!epicsInCol.length&&!orphansInCol.length)html+='<div class="empty-state"><span class="empty-icon">📭</span><span class="empty-text">No items here</span><span class="empty-hint">Stories will appear when added to this column</span></div>';
    html+='</div></div>';
  });

  document.getElementById('view-kanban').innerHTML=html;
}

/* ═══ SWIPE GESTURES ═══ */
(function(){
  var startX=0,startY=0,startTime=0;
  var mainEl=document.querySelector('.main');
  mainEl.addEventListener('touchstart',function(e){
    startX=e.touches[0].clientX;
    startY=e.touches[0].clientY;
    startTime=Date.now();
  },{passive:true});
  mainEl.addEventListener('touchend',function(e){
    if(CV!=='kanban')return;
    var dx=e.changedTouches[0].clientX-startX;
    var dy=e.changedTouches[0].clientY-startY;
    var dt=Date.now()-startTime;
    if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5&&dt<500){
      if(dx<0&&mobileColIdx<COL_ORDER.length-1){
        switchMobileCol(mobileColIdx+1);
      }else if(dx>0&&mobileColIdx>0){
        switchMobileCol(mobileColIdx-1);
      }
    }
  },{passive:true});
})();

function tkHTML(t,ec){
  var bl=!!t.blockedBy;
  var tags='';
  if(t.severity)tags+='<span class="tk-tag tag-'+t.severity.charAt(0).toLowerCase()+'">'+t.severity+'</span>';
  if(t.category)tags+='<span class="tk-tag tag-'+t.category+'">'+t.category+'</span>';
  var asg=t.assigned_to?'<span class="tk-asg"><span class="tk-asg-emoji">'+agentEmoji(t.assigned_to)+'</span>'+agentName(t.assigned_to)+'</span>':'<span class="tk-asg" style="color:var(--text3)">👤 Unassigned</span>';
  var ep=t.epicId?'<span class="tk-ep">⬆ '+t.epicId+'</span>':'';
  var cb=ec?'<div style="float:left;width:3px;border-radius:2px;margin-right:6px;background:'+ec+';height:100%;min-height:20px"></div>':'';
  var blk=bl?'<span class="tk-blocked-badge">⛔ BLOCKED</span>':'';
  return '<div class="tk'+(bl?' blocked':'')+(t.epicId?' epic-child':'')+'" onclick="openTD(\''+t.id+'\')">'+cb+'<div class="tk-top"><span class="tk-id">'+t.id+'</span>'+blk+'</div><div class="tk-title">'+t.title+'</div><div class="tk-tags">'+tags+'</div><div class="tk-bottom">'+asg+ep+'</div></div>';
}

/* ═══ TEAM VIEW ═══ */
function rTeam(){
  try{
    var el=document.getElementById('view-team');
    if(!el){console.error('view-team element not found');return;}
    var teams={};
    var agents=D.agents||[];
    var tickets=D.tickets||[];
    console.log('rTeam: rendering',agents.length,'agents');
    agents.forEach(function(a){
      if(!a.team)return;
      if(!teams[a.team])teams[a.team]=[];
      var agentTickets=tickets.filter(function(t){return t.assigned_to===a.id;});
      var done=agentTickets.filter(function(t){return t.status==='done'}).length;
      var total=agentTickets.length;
      var progress=total>0?Math.round(done/total*100):0;
      a._progress=progress;a._done=done;a._total=total;a._tickets=agentTickets;
      teams[a.team].push(a);
    });
    var order=['Leadership','Project','Research','Finance','Security','Operations'],h='';
    order.forEach(function(tm){
      if(!teams[tm])return;
      h+='<div class="team-section"><div class="team-sh">👥 '+tm+' ('+teams[tm].length+')</div><div class="team-grid">';
      teams[tm].forEach(function(a){
        var realStatus='idle';
        if(a._total===0){realStatus='idle';}
        else if(a._tickets.some(function(t){return t.status==='in_progress';})){realStatus='working';}
        else if(a._tickets.every(function(t){return t.status==='done';})){realStatus='idle';}

        var barWidth=10;
        var filled=Math.round(barWidth*a._progress/100);
        var bar='█'.repeat(filled)+'░'.repeat(barWidth-filled);

        var badgeClass='idle',badgeIcon='💤',badgeText='IDLE';
        if(realStatus==='working'){badgeClass='working';badgeIcon='🔨';badgeText='WORKING';}
        else if(realStatus==='not-active'){badgeClass='not-active';badgeIcon='🔴';badgeText='NOT ACTIVE';}
        else if(realStatus==='troubleshooting'){badgeClass='troubleshooting';badgeIcon='🔧';badgeText='TROUBLESHOOTING';}

        h+='<div class="agent-card" onclick="openAD(\''+a.id+'\')">';
        h+='<div class="agent-top"><span class="agent-emoji">'+(a.emoji||'👤')+'</span><span class="agent-status-badge '+badgeClass+'">'+badgeIcon+' '+badgeText+'</span></div>';
        h+='<div class="agent-name">'+a.name+'</div><div class="agent-title">'+a.title+'</div>';
        h+='<div class="agent-role">'+a.role+'</div>';
        if(a._total>0){
          h+='<div class="agent-progress"><div class="progress-bar"><div class="progress-fill" style="width:'+a._progress+'%"></div></div>';
          h+='<div class="progress-text">'+bar+' '+a._progress+'% ('+a._done+'/'+a._total+')</div></div>';
          h+='<div class="agent-ticket-list">';
          a._tickets.forEach(function(t){
            var tIcon=t.status==='done'?'✅':(t.status==='in_progress'?'🔨':'📋');
            h+='<div class="agent-ticket-item">'+tIcon+' '+t.id+': '+t.title.substring(0,35)+'</div>';
          });
          h+='</div>';
        }else{
          h+='<div class="agent-no-tickets">💤 Available — no tickets assigned</div>';
        }
        h+='</div>';
      });
      h+='</div></div>';
    });
    if(!h)h='<div class="empty">No agents found. Check tickets.json loaded correctly.</div>';
    el.innerHTML=h;
    console.log('rTeam: rendered successfully');
  }catch(e){
    console.error('rTeam error:',e);
  }
}

/* ═══ DETAIL PANELS ═══ */
function openTD(id){
  var t=(D.tickets||[]).find(function(x){return x.id===id});if(!t)return;
  var epic=t.epicId?(D.epics||[]).find(function(e){return e.id===t.epicId}):null;
  var blk=t.blockedBy?(D.tickets||[]).find(function(x){return x.id===t.blockedBy}):null;
  document.getElementById('dtitle').textContent=t.id+' — '+t.title;
  var h='';
  h+='<div class="ds"><div class="ds-id">'+t.id+(epic?' · ⬆ '+epic.id+': '+epic.title:'')+'</div><div class="ds-title">'+t.title+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Description</div><div class="ds-desc">'+(t.description||'No description')+'</div></div>';
  h+='<div class="ds-row"><div class="ds-col"><div class="ds-label">Status</div><select class="ds-select" onchange="uStatus(\''+t.id+'\',this.value)">';
  ['backlog','planned','in_progress','waiting','in_validation','done'].forEach(function(s){
    h+='<option value="'+s+'"'+(t.status===s?' selected':'')+'>'+s.replace(/_/g,' ')+'</option>';
  });
  h+='</select></div>';
  h+='<div class="ds-col"><div class="ds-label">Assignee</div><input class="ds-input" value="'+agentName(t.assigned_to)+'" placeholder="Agent name..." title="Type agent name or ID" onchange="uAssignName(\''+t.id+'\',this.value)"></div></div>';
  h+='<div class="ds-row"><div class="ds-col"><div class="ds-label">Priority</div><span class="badge '+(t.severity||'').toLowerCase()+'">'+t.severity+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Category</div><span class="badge '+(t.category||'')+'">'+t.category+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Team</div><span style="font-size:11px">'+t.team+'</span></div></div>';
  if(blk)h+='<div class="ds"><div class="ds-label">⛔ Blocked By</div><div class="bi" onclick="openTD(\''+blk.id+'\')">'+blk.id+': '+blk.title+'</div></div>';
  if(t.blocks)h+='<div class="ds"><div class="ds-label">Blocks</div><div class="bi">'+t.blocks+'</div></div>';

  // Work log + deliverable (real agent work, from agent-logs.json)
  var L=(LOGS&&LOGS.tickets&&LOGS.tickets[t.id])||null;
  if(L){
    h+='<div class="ds"><div class="ds-label">⚙ Work Log</div>';
    if(L.events&&L.events.length){
      h+=L.events.slice(-8).map(function(e){return '<div class="cm"><span class="cm-by">'+(e.event||'')+':</span> '+(e.content||'')+'<span class="cm-time">'+(e.ts?formatTime(e.ts):'')+'</span></div>';}).join('');
    } else { h+='<div style="color:var(--text3);font-size:10px">No work events yet</div>'; }
    h+='</div>';
    if(L.deliverable){
      h+='<div class="ds"><div class="ds-label">📎 Deliverable — '+L.deliverable.file+' ('+L.deliverable.size+' bytes)</div>';
      h+='<pre class="dlv-content">'+escapeHtml(L.deliverable.content||'')+'</pre></div>';
    }
  }

  // Comments section — OLD STYLE with working textarea + Save button
  h+='<div class="ds"><div class="ds-label">Comments</div>';
  if(t.comments&&t.comments.length){
    h+=t.comments.map(function(c){
      var time=c.timestamp?'<span class="cm-time">'+formatTime(c.timestamp)+'</span>':'';
      return '<div class="cm"><span class="cm-by">'+agentName(c.by)+':</span> '+c.text+time+'</div>';
    }).join('');
  } else {
    h+='<div style="color:var(--text3);font-size:10px">No comments</div>';
  }
  h+='<div class="cm-add">';
  h+='<textarea id="cm-'+t.id+'" placeholder="Add comment as CEO..." rows="3" style="width:100%;background:var(--bg4);border:1px solid var(--border);border-radius:5px;padding:8px;color:var(--text);font-size:12px;resize:vertical;min-height:60px"></textarea>';
  h+='<button class="cm-btn" onclick="addComment(\''+t.id+'\')">💾 Save Comment</button>';
  h+='</div></div>';

  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}

function openED(id){
  var e=(D.epics||[]).find(function(x){return x.id===id});if(!e)return;
  var st=(D.tickets||[]).filter(function(t){return t.epicId===e.id});
  var dn=st.filter(function(s){return s.status==='done'}).length;
  var pct=st.length?Math.round(dn/st.length*100):0;
  document.getElementById('dtitle').textContent=e.id+' — EPIC';
  var h='';
  h+='<div class="ds"><div class="ds-id" style="color:var(--blue)">'+e.id+' · EPIC</div><div class="ds-title">'+e.title+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Description</div><div class="ds-desc">'+(e.description||'No description')+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Progress</div><div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="pd">'+pct+'% ('+dn+'/'+st.length+' stories done)</div></div>';
  h+='<div class="ds-row"><div class="ds-col"><div class="ds-label">Priority</div><span class="badge '+(e.priority||'')+'">'+e.priority+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Team</div><span style="font-size:11px">'+(e.team||'—')+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Assignee</div><span style="font-size:11px">'+agentName(e.assignee)+'</span></div></div>';
  h+='<div class="ds"><div class="ds-label">Linked Stories ('+st.length+')</div>'+st.map(function(s){return '<div class="si" onclick="openTD(\''+s.id+'\')"><span class="sd '+s.status+'"></span><span style="font-family:monospace;font-size:9px;color:var(--blue)">'+s.id+'</span> '+s.title+(s.blockedBy?' <span class="badge bl" style="font-size:7px">BLOCKED</span>':'')+'</div>'}).join('')+'</div>';
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}

function openAD(id){
  var a=(D.agents||[]).find(function(x){return x.id===id});if(!a)return;
  var agentTickets=(D.tickets||[]).filter(function(t){return t.assigned_to===id});
  var done=agentTickets.filter(function(t){return t.status==='done'}).length;
  var total=agentTickets.length;
  var pct=total>0?Math.round(done/total*100):0;
  document.getElementById('dtitle').textContent=a.name+' — '+a.title;
  var h='';
  h+='<div class="ds"><div class="ds-id" style="color:var(--blue)">'+a.id+' · AGENT</div><div class="ds-title">'+a.name+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Role</div><div class="ds-val">'+a.role+'</div></div>';
  h+='<div class="ds-row"><div class="ds-col"><div class="ds-label">Team</div><span style="font-size:11px">'+a.team+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Status</div><span class="agent-status-badge '+(a.status==='working'?'working':'idle')+'">'+(a.status==='working'?'🔨 WORKING':'💤 IDLE')+'</span></div></div>';
  h+='<div class="ds"><div class="ds-label">Progress</div><div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="pd">'+pct+'% ('+done+'/'+total+' tickets done)</div></div>';
  h+='<div class="ds"><div class="ds-label">Assigned Tickets ('+total+')</div>';
  if(total===0){
    h+='<div class="agent-no-tickets">💤 No tickets assigned</div>';
  } else {
    agentTickets.forEach(function(t){
      var tIcon=t.status==='done'?'✅':(t.status==='in_progress'?'🔨':(t.status==='in_validation'?'🔍':'📋'));
      h+='<div class="si" onclick="closeDetail();openTD(\''+t.id+'\')"><span class="sd '+t.status+'"></span><span style="font-family:monospace;font-size:9px;color:var(--blue)">'+t.id+'</span> '+t.title.substring(0,40)+' '+tIcon+'</div>';
    });
  }
  h+='</div>';
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}

function closeDetail(){document.getElementById('dp').classList.remove('op')}

function uStatus(id,s){
  var t=D.tickets.find(function(x){return x.id===id});
  if(t){
    t.status=s;t.updatedAt=(new Date()).toISOString();
    if(s==='done')t.progress=100;
    else if(s==='in_progress'&&(t.progress===0||t.progress===100))t.progress=25;
    recalc();render();
    showNotif('Status updated','success');
  }
}

function uAssignName(id,name){
  var t=D.tickets.find(function(x){return x.id===id});
  if(!t)return;
  var aid=name;
  if(name){
    var agent=(D.agents||[]).find(function(a){return a.name.toLowerCase()===name.toLowerCase()||a.id.toLowerCase()===name.toLowerCase();});
    if(agent)aid=agent.id;
  }
  t.assigned_to=aid;
  t.updatedAt=(new Date()).toISOString();
  recalc();render();
  if(name)showNotif('Assignee: '+(agent?agent.name:name)+(agent?' ('+agent.id+')':''),'success');
  else showNotif('Assignee cleared','success');
}

function formatTime(iso){
  if(!iso) return '';
  var d=new Date(iso);
  var now=new Date();
  var diff=Math.floor((now-d)/1000);
  if(diff<60) return 'just now';
  if(diff<3600) return Math.floor(diff/60)+'m ago';
  if(diff<86400) return Math.floor(diff/3600)+'h ago';
  if(diff<604800) return Math.floor(diff/86400)+'d ago';
  return d.toLocaleDateString();
}

function addComment(id){
  var ta=document.getElementById('cm-'+id);
  if(!ta||!ta.value.trim()) return;
  var t=D.tickets.find(function(x){return x.id===id});
  if(!t) return;
  if(!t.comments) t.comments=[];
  t.comments.push({by:'CEO',text:ta.value.trim(),timestamp:new Date().toISOString()});
  t.updatedAt=(new Date()).toISOString();
  recalc();
  render();
  showNotif('Comment saved','success');
  // Re-open the detail panel to show the new comment
  openTD(id);
}

/* ═══ PULL TO REFRESH (mobile) ═══ */
(function(){
  var ptr=document.getElementById('ptrIndicator');
  var ptrText=document.getElementById('ptrText');
  var startY=0,curY=0,pulling=false,refreshing=false;
  var threshold=80;
  var mainEl=document.querySelector('.main');
  if(!ptr||!mainEl)return;

  mainEl.addEventListener('touchstart',function(e){
    if(mainEl.scrollTop>0)return;
    startY=e.touches[0].clientY;
    pulling=true;
    ptr.classList.remove('ptr-ready','ptr-loading');
  },{passive:true});

  mainEl.addEventListener('touchmove',function(e){
    if(!pulling||refreshing)return;
    curY=e.touches[0].clientY;
    var dy=curY-startY;
    if(dy>0&&mainEl.scrollTop<=0){
      e.preventDefault();
      if(dy>threshold){
        ptr.classList.add('ptr-ready');
        ptrText.textContent='Release to refresh';
      }else{
        ptr.classList.remove('ptr-ready');
        ptrText.textContent='Pull to refresh';
      }
      ptr.style.transform='translateY('+Math.min(dy*.3,60)+'px)';
    }
  },{passive:false});

  mainEl.addEventListener('touchend',function(e){
    if(!pulling)return;
    pulling=false;
    ptr.style.transform='';
    if(ptr.classList.contains('ptr-ready')&&!refreshing){
      refreshing=true;
      ptr.classList.remove('ptr-ready');
      ptr.classList.add('ptr-loading');
      ptrText.textContent='Syncing...';
      loadData();
      setTimeout(function(){
        refreshing=false;
        ptr.classList.remove('ptr-loading');
        ptrText.textContent='Pull to refresh';
      },1000);
    }
  },{passive:true});
})();

/* ═══ ACTIVITY STREAM ═══ */
var activityEvents=[];
var activityPoll=null;
var activityPaused=false;
var activityFilterAgent='';
var activityFilterKeyword='';

function startActivityStream(){
  var el=document.getElementById('view-activity');
  if(!el)return;
  el.innerHTML='<div class="activity-hdr"><div class="activity-title">⚡ Agent Activity Stream</div><div class="activity-controls"><select class="activity-filter" id="activity-agent-filter" onchange="activitySetAgent(this.value)"><option value="">All Agents</option></select><input class="activity-filter" id="activity-keyword-filter" type="text" placeholder="Filter by keyword..." oninput="activitySetKeyword(this.value)" style="min-width:120px"><button class="activity-btn" id="activity-pause-btn" onclick="activityTogglePause()">⏸ Pause</button><button class="activity-btn" onclick="activityClear()">🗑 Clear</button></div></div><div class="activity-stats" id="activity-stats"></div><div class="activity-list" id="activity-list"><div class="empty-state activity-empty"><span class="empty-icon">📡</span><span>Loading activity...</span></div></div>';
  setTimeout(function(){activityLoadHistory();},50);
  if(activityPoll)clearInterval(activityPoll);
  activityPoll=setInterval(activityFetchEvents,10000);
}

function stopActivityStream(){
  if(activityPoll){clearInterval(activityPoll);activityPoll=null;}
}

function activityLoadHistory(){
  // Real activity comes from agent-activity.json (each event carries its own real timestamp)
  // plus ticket comments. We no longer synthesize status rows from ticket.updatedAt: batch
  // scripts stamp many tickets with one shared updatedAt that is overwritten each run, which
  // made the feed repeat the same rows at an ever-advancing "recent" time.
  fetch('agent-activity.json?t='+Date.now()).then(function(r){return r.json();}).then(function(a){
    var events=[];
    (a&&a.events||[]).forEach(function(ev){
      var raw=ev.ts||ev.timestamp;
      var ms=typeof raw==='number'?raw:(raw?new Date(raw).getTime():0);
      if(!ms)return;
      var content=ev.content||((ev.event||'update')+(ev.ticket?' '+ev.ticket:'')+(ev.status?' → '+String(ev.status).replace(/_/g,' '):''));
      events.push({
        timestamp:ms,
        agent:ev.agent||'Unknown',
        displayName:agentName(ev.agent),
        emoji:ev.emoji||agentEmoji(ev.agent),
        type:ev.type||(ev.event==='started'?'status_change':(ev.event||'system')),
        content:content,
        ticketId:ev.ticketId||ev.ticket
      });
    });
    (D.tickets||[]).forEach(function(t){
      if(t.comments&&t.comments.length>0){
        t.comments.forEach(function(c){
          if(!c.timestamp)return;
          events.push({
            timestamp:new Date(c.timestamp).getTime(),
            agent:c.by||t.assigned_to||'Unknown',
            displayName:agentName(c.by||t.assigned_to),
            emoji:agentEmoji(c.by||t.assigned_to),
            type:'comment',
            content:c.text.substring(0,100),
            ticketId:t.id,
            ticketTitle:t.title
          });
        });
      }
    });
    events.sort(function(a,b){return b.timestamp-a.timestamp});
    activityEvents=events.slice(0,100);
    activityUpdateFilterOptions();
    activityRender();
  }).catch(function(){});
}

function activityFetchEvents(){
  if(activityPaused)return;
  activityLoadHistory();
}

function activityOpenItem(e){
  if(e.ticketId){
    var t=(D.tickets||[]).find(function(x){return x.id===e.ticketId});
    if(t){openTD(t.id);return;}
  }
  if(e.epicId){
    var ep=(D.epics||[]).find(function(x){return x.id===e.epicId});
    if(ep){openED(ep.id);return;}
  }
}

function activityRender(){
  var list=document.getElementById('activity-list');
  var stats=document.getElementById('activity-stats');
  var countBadge=document.getElementById('activity-count');
  if(!list)return;
  var filtered=activityEvents.filter(function(e){
    if(activityFilterAgent&&e.agent!==activityFilterAgent)return false;
    if(activityFilterKeyword&&e.content.toLowerCase().indexOf(activityFilterKeyword.toLowerCase())===-1)return false;
    return true;
  });
  if(countBadge)countBadge.textContent=String(filtered.length);
  if(stats)stats.textContent='Showing '+filtered.length+' of '+activityEvents.length+' events';
  if(filtered.length===0){
    list.innerHTML='<div class="empty-state activity-empty"><span class="empty-icon">📭</span><span>No activity matching filters or data still loading...</span></div>';
    return;
  }
  var html='';
  filtered.slice(0,50).forEach(function(e){
    var d=new Date(e.timestamp);
    var now=new Date();
    var isToday=d.toDateString()===now.toDateString();
    var timeStr;
    if(isToday){
      timeStr=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
    } else {
      var month=d.toLocaleString('en-US',{month:'short'});
      var day=d.getDate();
      var hrs=d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false});
      timeStr=month+' '+day+' '+hrs;
    }
    var ref=e.ticketId?'Ticket: '+e.ticketId:(e.epicId?'Epic: '+e.epicId:'');
    html+='<div class="activity-item'+(e._new?' new':'')+'" onclick="activityOpenItem('+JSON.stringify(e).replace(/"/g,'&quot;')+')" style="cursor:pointer">';
    html+='<div class="activity-avatar">'+(e.emoji||'🤖')+'</div>';
    html+='<div class="activity-content">';
    html+='<div class="activity-meta"><span class="activity-agent">'+agentName(e.agent||e.displayName)+'</span><span class="activity-time">'+timeStr+'</span><span class="activity-type '+e.type+'">'+e.type.replace(/_/g,' ')+'</span><span style="font-size:9px;color:var(--blue);margin-left:4px">'+ref+'</span></div>';
    html+='<div class="activity-text">'+escapeHtml(e.content)+'</div>';
    html+='</div></div>';
  });
  list.innerHTML=html;
  if(!activityPaused){list.scrollTop=0;}
}
function activityUpdateFilterOptions(){
  var sel=document.getElementById('activity-agent-filter');
  if(!sel)return;
  var agents={};
  activityEvents.forEach(function(e){if(e.agent)agents[e.agent]=true});
  var current=sel.value;
  var html='<option value="">All Agents</option>';
  Object.keys(agents).sort().forEach(function(a){
    html+='<option value="'+a+'"'+(a===current?' selected':'')+'>'+agentName(a)+'</option>';
  });
  sel.innerHTML=html;
}

function activitySetAgent(v){activityFilterAgent=v;activityRender();}
function activitySetKeyword(v){activityFilterKeyword=v;activityRender();}

function activityTogglePause(){
  activityPaused=!activityPaused;
  var btn=document.getElementById('activity-pause-btn');
  if(btn){
    btn.textContent=activityPaused?'▶ Resume':'⏸ Pause';
    btn.classList.toggle('paused',activityPaused);
  }
}

function activityClear(){activityEvents=[];activityRender();}

function escapeHtml(s){
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

function agentEmoji(name){
  var emojis={'lucy':'👩‍💼','Lucy':'👩‍💼','orchestrator':'⚡','zeus':'⚡','Zeus':'⚡','tom':'⚔️','gladiator':'⚔️','Gladiator':'⚔️','devops':'🔨','thor':'🔨','Thor':'🔨','qa':'🛡️','athena':'🛡️','Athena':'🛡️','security':'💀','hades':'💀','Hades':'💀','pm':'🌈','iris':'🌈','Iris':'🌈','research':'📡','hermes':'📡','Hermes':'📡','business-analyst':'🔮','minerva':'🔮','Minerva':'🔮','data-analyst':'📊','clio':'📊','Clio':'📊','data-engineer':'🔥','vulcan':'🔥','Vulcan':'🔥','finance':'💰','plutus':'💰','Plutus':'💰','accounting':'📒','hestia':'📒','Hestia':'📒','budget':'⚖️','juno':'⚖️','Juno':'⚖️','income':'🍀','fortuna':'🍀','Fortuna':'🍀','sentinel':'👁️','nemesis':'👁️','Nemesis':'👁️','monitor':'🔭','argus':'🔭','Argus':'🔭','org-excellence':'🧠','metis':'🧠','Metis':'🧠','claude':'🤖','Claude':'🤖','ml-engineer':'💻','ML Engineer':'💻','analyst':'📈','Analyst':'📈','doer':'🔧','Doer':'🔧'};
  return emojis[name]||'🤖';
}

function agentName(id){
  if(!id)return id;
  var a=(D.agents||[]).find(function(x){return x.id===id;});
  if(a)return a.name;
  var nameMap={'lucy':'Lucy','orchestrator':'Zeus','tom':'Gladiator','devops':'Thor','qa':'Athena','security':'Hades','pm':'Iris','research':'Hermes','business-analyst':'Minerva','data-analyst':'Clio','data-engineer':'Vulcan','finance':'Plutus','accounting':'Hestia','budget':'Juno','income':'Fortuna','sentinel':'Nemesis','monitor':'Argus','org-excellence':'Metis','claude':'Claude','ml-engineer':'ML Engineer'};
  return nameMap[id]||id;
}

loadData();
setInterval(loadData,30000);

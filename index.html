<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>💎 Super Compagnie — Mission Control</title>
<style>
/* ═══════════════════════════════════════════════════════════════
   MISSION CONTROL — Super Compagnie Kanban Board
   Mobile-first responsive design with dark theme
   ═══════════════════════════════════════════════════════════════ */
:root {
  --bg:#0a0e17;--bg2:#111827;--bg3:#1a2332;--bg4:#243044;
  --border:#1e2d3d;--border2:#2a3f54;
  --text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;
  --blue:#3b82f6;--blue2:#2563eb;--cyan:#06b6d4;
  --green:#22c55e;--green2:#16a34a;
  --orange:#f59e0b;--orange2:#d97706;
  --red:#ef4444;--red2:#dc2626;
  --purple:#a855f7;--purple2:#9333ea;
  --pink:#ec4899;--yellow:#eab308;
  --radius:8px;--radius2:12px;--radius3:16px;
  --shadow:0 4px 24px rgba(0,0,0,.4);
  --shadow2:0 8px 32px rgba(0,0,0,.5);
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --font-mono:'SF Mono','Fira Code',monospace;
  --transition:all .2s ease;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:var(--bg);color:var(--text);font-size:14px;line-height:1.5}
a{color:var(--blue);text-decoration:none}
a:hover{text-decoration:underline}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text3)}

/* ═══ HEADER ═══ */
.hdr{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;gap:8px;z-index:100;position:relative}
.hdr::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--blue),var(--cyan),var(--green),var(--orange),var(--purple));animation:shimmer 3s linear infinite;background-size:200% 100%}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.hdr-left{display:flex;align-items:center;gap:10px}
.logo{font-size:20px;animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.hdr h1{font-size:16px;font-weight:700;background:linear-gradient(90deg,var(--blue),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr-badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.badge-live{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.badge-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:blink 1.5s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.badge-count{background:var(--bg4);color:var(--text2);border:1px solid var(--border)}
.hdr-right{display:flex;gap:6px;align-items:center}
.btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border-radius:var(--radius);border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:10px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap}
.btn:hover{background:var(--bg4);border-color:var(--border2);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-pri{background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;box-shadow:0 2px 8px rgba(59,130,246,.3)}
.btn-pri:hover{background:linear-gradient(135deg,var(--blue2),var(--blue));box-shadow:0 4px 12px rgba(59,130,246,.4)}
.btn-icon{padding:5px;border-radius:var(--radius);min-width:28px;justify-content:center}
.jira-link{font-size:9px;padding:3px 8px}

/* ═══ VIEW TABS ═══ */
.tabs{display:flex;gap:2px;padding:6px 12px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;overflow-x:auto}
.tab{display:inline-flex;align-items:center;gap:4px;padding:5px 14px;border-radius:var(--radius);border:none;background:transparent;color:var(--text3);font-size:11px;font-weight:600;cursor:pointer;transition:var(--transition);white-space:nowrap;position:relative}
.tab:hover{color:var(--text);background:var(--bg3)}
.tab.active{color:var(--text);background:var(--bg4);box-shadow:0 1px 3px rgba(0,0,0,.2)}
.tab.active::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);width:20px;height:2px;border-radius:1px;background:var(--blue)}
.tab .num{font-size:8px;padding:1px 4px;border-radius:6px;background:var(--bg4);color:var(--text3)}
.tab.active .num{background:var(--blue);color:#fff}

/* ═══ MAIN ═══ */
.main{display:flex;flex:1;overflow:hidden;position:relative}

/* ═══ BOARD VIEW ═══ */
.board{display:flex;gap:10px;padding:12px;overflow-x:auto;overflow-y:hidden;flex:1;align-items:stretch;height:100%}
.col{min-width:260px;max-width:320px;flex:0 0 auto;background:var(--bg2);border-radius:var(--radius2);border:1px solid var(--border);display:flex;flex-direction:column;height:100%;transition:var(--transition)}
.col:hover{border-color:var(--border2);box-shadow:var(--shadow)}
.col-hdr{padding:8px 10px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.col-title{display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
.col-dot{width:8px;height:8px;border-radius:50%}
.col-cnt{font-size:9px;padding:1px 5px;border-radius:6px;background:var(--bg4);color:var(--text3);font-weight:600}
.col-body{flex:1;overflow-y:auto;padding:6px;min-height:0}

/* Column colors */
.col-todo .col-dot{background:var(--text3)}
.col-todo .col-title{color:var(--text3)}
.col-planned .col-dot{background:var(--orange)}
.col-planned .col-title{color:var(--orange)}
.col-progress .col-dot{background:var(--blue);animation:blink 1.5s ease-in-out infinite}
.col-progress .col-title{color:var(--blue)}
.col-review .col-dot{background:var(--purple)}
.col-review .col-title{color:var(--purple)}
.col-validation .col-dot{background:var(--cyan)}
.col-validation .col-title{color:var(--cyan)}
.col-done .col-dot{background:var(--green)}
.col-done .col-title{color:var(--green)}
.col-waiting .col-dot{background:var(--text3);opacity:.5}
.col-waiting .col-title{color:var(--text3);opacity:.7}

/* ═══ TICKET CARD ═══ */
.tk{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:4px;cursor:pointer;transition:var(--transition);position:relative}
.tk:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.tk:active{transform:translateY(0)}
.tk.blocked{opacity:.5;border-color:var(--red)}
.tk.epic-child{margin-left:10px;border-left:2px solid var(--border2)}
.tk-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px}
.tk-id{font-family:var(--font-mono);font-size:8px;color:var(--text3);font-weight:600}
.tk-title{font-size:11px;font-weight:500;margin:3px 0;line-height:1.3}
.tk-tags{display:flex;gap:3px;margin-top:4px;flex-wrap:wrap}
.tk-tag{font-size:7px;padding:1px 4px;border-radius:4px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.tag-c{background:var(--red);color:#fff}.tag-h{background:var(--orange);color:#fff}
.tag-m{background:var(--yellow);color:#000}.tag-l{background:var(--green);color:#fff}
.tag-infra{background:rgba(59,130,246,.2);color:var(--blue)}
.tag-feat{background:rgba(168,85,247,.2);color:var(--purple)}
.tag-bug{background:rgba(239,68,68,.2);color:var(--red)}
.tag-doc{background:rgba(6,182,212,.2);color:var(--cyan)}
.tag-agent{background:rgba(245,158,11,.2);color:var(--orange)}
.tag-team{background:rgba(34,197,94,.2);color:var(--green)}
.tag-ref{background:rgba(100,116,139,.2);color:var(--text3)}
.tag-research{background:rgba(168,85,247,.2);color:var(--purple)}
.tag-finance{background:rgba(234,179,8,.2);color:var(--yellow)}
.tag-security{background:rgba(239,68,68,.2);color:var(--red)}
.tk-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.tk-asg{display:flex;align-items:center;gap:3px;font-size:9px;color:var(--text2)}
.tk-asg-emoji{font-size:12px}
.tk-ep{font-family:var(--font-mono);font-size:8px;color:var(--blue)}
.tk-blocked-badge{font-size:7px;padding:1px 4px;border-radius:4px;background:rgba(239,68,68,.2);color:var(--red);font-weight:700}

/* Epic group */
.eg{margin-bottom:8px;background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.el{font-family:var(--font-mono);font-size:8px;color:var(--blue);padding:4px 8px;cursor:pointer;background:var(--bg3);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.el:hover{background:var(--bg4)}
.ep-bar{height:2px;background:var(--bg4);overflow:hidden}
.ep-bar-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s}

/* ═══ DETAIL PANEL ═══ */
.dp{width:380px;background:var(--bg2);border-left:1px solid var(--border);display:none;flex-direction:column;flex-shrink:0;overflow:hidden}
.dp.op{display:flex}
.dp-hdr{padding:12px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.dp-hdr h2{font-size:13px;font-weight:600;line-height:1.3}
.dp-close{background:none;border:none;color:var(--text3);font-size:18px;cursor:pointer;padding:2px 6px;border-radius:4px;transition:var(--transition)}
.dp-close:hover{background:var(--bg4);color:var(--text)}
.dp-body{flex:1;overflow-y:auto;padding:16px}
.ds{margin-bottom:14px}
.ds-label{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text3);margin-bottom:3px}
.ds-val{font-size:12px;line-height:1.4}
.ds-id{font-family:var(--font-mono);color:var(--blue);font-size:10px}
.ds-title{font-size:15px;font-weight:600;margin:5px 0}
.ds-desc{font-size:12px;color:var(--text);line-height:1.5;background:var(--bg);padding:8px;border-radius:5px;border:1px solid var(--border)}
.ds-select,.ds-input{width:100%;padding:4px 8px;border-radius:4px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-size:11px}
.ds-select:hover,.ds-input:hover{border-color:var(--border2)}
.ds-row{display:flex;gap:8px;margin-bottom:8px}
.ds-col{flex:1}
.cm{padding:6px;border-radius:4px;border:1px solid var(--border);margin-bottom:4px;font-size:11px}
.cm-by{font-weight:600;color:var(--blue);font-size:9px}
.bi{font-size:10px;color:red;padding:1px 0;cursor:pointer}
.bi:hover{text-decoration:underline}
.si{font-size:10px;padding:2px 0;display:flex;align-items:center;gap:5px;cursor:pointer;border-radius:3px}
.si:hover{background:var(--bg3)}
.sd{width:6px;height:6px;border-radius:50%}
.sd.done{background:var(--green)}.sd.in_progress{background:var(--blue)}
.sd.backlog{background:var(--border2)}.sd.in_validation{background:var(--cyan)}
.sd.review{background:var(--purple)}.sd.planned{background:var(--orange)}
.sd.blocked{background:var(--red)}
.pd{font-size:11px;font-weight:600}
.progress{height:4px;background:var(--bg4);border-radius:2px;margin:5px 0;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s}

/* ═══ LIST VIEW ═══ */
.lv{flex:1;overflow:auto;padding:12px;display:none}
.lv-table{width:100%;border-collapse:collapse;font-size:11px}
.lv-th{text-align:left;padding:6px 8px;background:var(--bg2);border-bottom:1px solid var(--border);color:var(--text3);font-weight:600;text-transform:uppercase;font-size:9px;letter-spacing:.5px;position:sticky;top:0}
.lv-tr:hover{background:var(--bg2)}
.lv-td{padding:6px 8px;border-bottom:1px solid var(--border);vertical-align:top}
.lv-key{font-family:var(--font-mono);color:var(--blue);font-size:10px}
.lv-title{color:var(--text);font-weight:500}
.lv-asg{color:var(--text2)}.lv-ep{font-family:var(--font-mono);color:var(--blue);font-size:9px}

/* ═══ BACKLOG VIEW ═══ */
.bg-view{flex:1;overflow:auto;padding:12px;display:none}
.bg-section{margin-bottom:16px}
.bg-sh{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:6px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.bg-item{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:8px;margin-bottom:3px;cursor:pointer}
.bg-item:hover{border-color:var(--border2)}
.bg-title{font-size:11px;font-weight:500;color:var(--text)}
.bg-meta{display:flex;gap:6px;margin-top:3px;align-items:center;font-size:9px;color:var(--text3)}

/* ═══ TEAM VIEW ═══ */
.team-view{flex:1;overflow:auto;padding:12px;display:none}
.team-section{margin-bottom:16px}
.team-sh{font-size:12px;font-weight:600;color:var(--blue);margin-bottom:8px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px}
.agent-card{background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius);padding:10px;transition:var(--transition)}
.agent-card:hover{border-color:var(--border2);transform:translateY(-1px);box-shadow:var(--shadow)}
.agent-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.agent-emoji{font-size:22px}
.agent-status{font-size:8px;padding:1px 6px;border-radius:6px;font-weight:700}
.agent-status.active{background:rgba(34,197,94,.2);color:var(--green)}
.agent-status.idle{background:var(--bg4);color:var(--text3)}
.agent-name{font-size:13px;font-weight:600;color:var(--text)}
.agent-title{font-size:10px;color:var(--blue);margin-top:2px;font-weight:500}
.agent-role{font-size:9px;color:var(--text3);margin-top:4px;line-height:1.3}
.agent-status-badge{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.agent-status-badge.idle{background:rgba(6,182,212,.15);color:var(--cyan);border:1px solid rgba(6,182,212,.3)}
.agent-status-badge.working{background:rgba(34,197,94,.15);color:var(--green);border:1px solid rgba(34,197,94,.3)}
.agent-status-badge.not-active{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3)}
.agent-status-badge.troubleshooting{background:rgba(245,158,11,.15);color:var(--orange);border:1px solid rgba(245,158,11,.3)}
.agent-progress{margin-top:6px}
.progress-bar{height:4px;background:var(--bg4);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan));transition:width .3s}
.progress-text{font-size:8px;color:var(--text3);margin-top:2px;font-family:var(--font-mono)}
.agent-ticket-list{margin-top:4px;border-top:1px solid var(--border);padding-top:3px}
.agent-ticket-item{font-size:8px;color:var(--text2);padding:1px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agent-no-tickets{color:var(--text3);font-size:9px;margin-top:4px;font-style:italic}
.agent-tickets{font-size:9px;color:var(--text2);margin-top:4px;font-family:var(--font-mono)}

/* ═══ NOTIFICATIONS ═══ */
.notif{position:fixed;bottom:16px;right:16px;padding:10px 16px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border);box-shadow:var(--shadow2);font-size:11px;z-index:1000;animation:slideIn .3s ease}
.notif.success{border-left:3px solid var(--green)}
.notif.error{border-left:3px solid var(--red)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* ═══ RESPONSIVE — MOBILE ═══ */
@media(max-width:768px){
  .hdr{padding:6px 10px}
  .hdr h1{font-size:13px}
  .hdr-badges{display:none}
  .btn{padding:4px 8px;font-size:9px}
  .tabs{padding:4px 8px}
  .tab{padding:4px 10px;font-size:10px}
  .board{gap:6px;padding:8px}
  .col{min-width:220px;max-width:280px}
  .dp{position:absolute;top:0;right:0;bottom:0;width:100%;z-index:200;border-left:none;box-shadow:var(--shadow2)}
  .tk-title{font-size:10px}
  .team-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr))}
}
@media(max-width:480px){
  .col{min-width:180px}
  .hdr-left{gap:6px}
  .logo{font-size:16px}
  .hdr h1{font-size:11px}
  .tab{padding:3px 8px;font-size:9px}
}

/* ═══ LOADING ═══ */
.loading{display:flex;align-items:center;justify-content:center;height:100%;color:var(--text3);font-size:12px}
.loading::after{content:'';width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--blue);border-radius:50%;animation:spin .6s linear infinite;margin-left:8px}
@keyframes spin{to{transform:rotate(360deg)}}

/* ═══ EMPTY STATE ═══ */
.empty{display:flex;align-items:center;justify-content:center;height:60px;color:var(--text3);font-size:10px;text-align:center;padding:10px}
</style>

<body>

<!-- ═══ HEADER ═══ -->
<div class="hdr">
  <div class="hdr-left">
    <span class="logo">💎</span>
    <h1>Mission Control</h1>
    <div class="hdr-badges">
      <span class="badge badge-live">● LIVE</span>
      <span class="badge badge-count" id="badge-epics">0 Epics</span>
      <span class="badge badge-count" id="badge-tickets">0 Tickets</span>
      <span class="badge badge-count" id="badge-active">0 Active</span>
    </div>
  </div>
  <div class="hdr-right">
    <a class="btn jira-link" href="https://opends007.atlassian.net/jira/software/projects/TD/boards/2" target="_blank">📋 Jira →</a>
    <button class="btn btn-icon" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
    <button class="btn btn-pri" onclick="loadData()">↻ Sync</button>
  </div>
</div>

<!-- ═══ TABS ═══ -->
<div class="tabs">
  <button class="tab active" id="tab-kanban" onclick="goView('kanban')">📊 Board</button>
  <button class="tab" id="tab-list" onclick="goView('list')">📝 List</button>
  <button class="tab" id="tab-backlog" onclick="goView('backlog')">📦 Backlog</button>
  <button class="tab" id="tab-team" onclick="goView('team')">👥 Team <span class="num">18</span></button>
</div>

<!-- ═══ MAIN ═══ -->
<div class="main">
  <!-- Board View -->
  <div id="view-kanban" class="board"></div>
  <!-- List View -->
  <div id="view-list" class="lv"></div>
  <!-- Backlog View -->
  <div id="view-backlog" class="bg-view"></div>
  <!-- Team View -->
  <div id="view-team" class="team-view"></div>
  <!-- Detail Panel -->
  <div class="dp" id="dp">
    <div class="dp-hdr"><h2 id="dtitle">Detail</h2><button class="dp-x" onclick="closeDetail()">✕</button></div>
    <div class="dp-b" id="db"></div>
  </div>
</div>

<script>
var D={epics:[],tickets:[],stats:{}};
var CV='kanban';

// Status → Column mapping (matches Jira exactly)
var COL_MAP={backlog:'todo',planned:'planned',in_progress:'progress',review:'review',in_validation:'validation',done:'done',waiting:'waiting'};
var COL_ORDER=['todo','planned','progress','review','validation','done','waiting'];
var COL_NAMES={todo:'📋 To Do',planned:'📌 Planned',progress:'🔧 In Progress',review:'👀 Review',validation:'🔍 Validation',done:'✅ Done',waiting:'⏳ Waiting'};

function loadData(){
  fetch('tickets.json?t='+Date.now())
    .then(r=>r.json())
    .then(d=>{
      D=d;
      console.log('Loaded:', D.epics.length, 'epics,', D.tickets.length, 'tickets,', (D.agents||[]).length, 'agents');
      recalc();
      render();
      showNotif('Data synced: ' + D.tickets.length + ' tickets, ' + (D.agents||[]).length + ' agents', 'success');
    })
    .catch(e=>{console.error(e);showNotif('Sync failed','error');});
}

function recalc(){
  var tk=D.tickets||[], ep=D.epics||[];
  ep.forEach(function(e){
    var st=tk.filter(function(t){return t.epicId===e.id});
    if(!st.length){e.progress=0;e.col='todo';return}
    var dn=st.filter(function(s){return s.status==='done'}).length;
    var active=st.filter(function(s){return s.status in {in_progress:1,review:1,in_validation:1,planned:1}}).length;
    e.progress=Math.round(dn/st.length*100);
    e.col=(dn===st.length)?'done':(active>0)?'progress':'todo';
  });
  tk.forEach(function(t){t.col=COL_MAP[t.status]||'todo'});
}

function goView(v){
  CV=v;
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.getElementById('tab-'+v).classList.add('active');
  ['kanban','list','backlog','team'].forEach(function(view){
    var el=document.getElementById('view-'+view);
    if(v===view){
      if(view==='kanban')el.style.display='flex';
      else el.style.display='block';
    }else{el.style.display='none';}
  });
  closeDetail();
  render();
}

function render(){
  try{
    if(CV==='kanban'){rBoard()}else if(CV==='list'){rList()}else if(CV==='backlog'){rBacklog()}else if(CV==='team'){rTeam()}
    rStats();
  }catch(e){
    console.error('Render error:', e);
    showNotif('Render error: ' + e.message, 'error');
  }
}

function rStats(){
  var tk=D.tickets||[], ep=D.epics||[];
  var active=tk.filter(function(t){return t.status in {in_progress:1,review:1,in_validation:1,planned:1}}).length;
  document.getElementById('badge-epics').textContent=ep.length+' Epics';
  document.getElementById('badge-tickets').textContent=tk.length+' Tickets';
  document.getElementById('badge-active').textContent=active+' Active';
}

/* ═══ BOARD VIEW ═══ */
function rBoard(){
  var ep=D.epics||[],tk=D.tickets||[];
  var ecm={};ep.forEach(function(e,i){ecm[e.id]=['#3b82f6','#a855f7','#f59e0b','#22c55e','#ef4444','#06b6d4','#ec4899','#eab308'][i%8]});
  var byEpic={};ep.forEach(function(e){byEpic[e.id]=[]});
  var orphans=[];
  tk.forEach(function(t){if(t.epicId&&byEpic[t.epicId])byEpic[t.epicId].push(t);else orphans.push(t)});

  var html='';
  COL_ORDER.forEach(function(s){
    var colId='col-'+s;
    var colName=COL_NAMES[s];
    var colClass='col-'+s;

    // Count items in this column
    var epicsInCol=ep.filter(function(e){return e.col===s});
    var orphansInCol=orphans.filter(function(t){return t.col===s});
    var cnt=epicsInCol.length+orphansInCol.length;

    html+='<div class="col '+colClass+'"><div class="col-hdr"><div class="col-title"><span class="col-dot"></span>'+colName+'</div><span class="col-cnt">('+cnt+')</span></div><div class="col-body">';

    ep.forEach(function(e){
      if(e.col!==s)return;
      var st=byEpic[e.id]||[],dn=st.filter(function(x){return x.status==='done'}).length;
      html+='<div class="eg"><div class="el" onclick="openED(\''+e.id+'\')">⬆ '+e.id+': '+e.title+' <span style="color:var(--text3)">['+dn+'/'+st.length+']</span></div>';
      html+='<div class="ep-bar"><div class="ep-bar-fill" style="width:'+e.progress+'%"></div></div>';
      st.forEach(function(t){html+=tkHTML(t,ecm[t.epicId])});
      html+='</div>';
    });

    orphans.forEach(function(t){
      if(t.col===s)html+=tkHTML(t,null);
    });

    if(!epicsInCol.length&&!orphansInCol.length)html+='<div class="empty">No items</div>';
    html+='</div></div>';
  });

  document.getElementById('view-kanban').innerHTML=html;
}

function tkHTML(t,ec){
  var bl=!!t.blockedBy;
  var tags='';
  if(t.severity)tags+='<span class="tk-tag tag-'+t.severity.charAt(0).toLowerCase()+'">'+t.severity+'</span>';
  if(t.category)tags+='<span class="tk-tag tag-'+t.category+'">'+t.category+'</span>';
  var asg=t.assigned_to?'<span class="tk-asg"><span class="tk-asg-emoji">👤</span>'+t.assigned_to+'</span>':'<span class="tk-asg" style="color:var(--text3)">👤 Unassigned</span>';
  var ep=t.epicId?'<span class="tk-ep">⬆ '+t.epicId+'</span>':'';
  var cb=ec?'<div style="float:left;width:3px;border-radius:2px;margin-right:6px;background:'+ec+';height:100%;min-height:20px"></div>':'';
  var blk=bl?'<span class="tk-blocked-badge">⛔ BLOCKED</span>':'';
  return '<div class="tk'+(bl?' blocked':'')+(t.epicId?' epic-child':'')+'" onclick="openTD(\''+t.id+'\')">'+cb+'<div class="tk-top"><span class="tk-id">'+t.id+'</span>'+blk+'</div><div class="tk-title">'+t.title+'</div><div class="tk-tags">'+tags+'</div><div class="tk-bottom">'+asg+ep+'</div></div>';
}

/* ═══ LIST VIEW ═══ */
function rList(){
  var el=document.getElementById('view-list'),h='';
  h+='<table class="lv-table"><thead><tr><th class="lv-th">Key</th><th class="lv-th">Title</th><th class="lv-th">Epic</th><th class="lv-th">Status</th><th class="lv-th">Priority</th><th class="lv-th">Assignee</th></tr></thead><tbody>';
  var all=[];
  (D.epics||[]).forEach(function(e){all.push({key:e.id,title:e.title,epic:'-',status:e.status,priority:e.priority||'Medium',assignee:e.assignee||'-',isEpic:true,progress:e.progress})});
  (D.tickets||[]).forEach(function(e){all.push({key:e.id,title:e.title,epic:e.epicId||'-',status:e.status,priority:e.severity,assignee:e.assigned_to||'-',isEpic:false})});
  all.forEach(function(item){
    var st=item.status.replace(/_/g,' ');
    h+='<tr class="lv-tr" onclick="'+(item.isEpic?'openED':'openTD')+'(\''+item.key+'\')">';
    h+='<td class="lv-td"><span class="lv-key">'+item.key+'</span></td>';
    h+='<td class="lv-td"><span class="lv-title">'+(item.isEpic?'📁 ':'')+item.title+'</span></td>';
    h+='<td class="lv-td"><span class="lv-epic">'+item.epic+'</span></td>';
    h+='<td class="lv-td"><span class="lv-status '+item.status+'">'+st+'</span></td>';
    h+='<td class="lv-td"><span class="badge '+(item.priority||'').toLowerCase()+'">'+item.priority+'</span></td>';
    h+='<td class="lv-td"><span class="lv-asg">'+item.assignee+'</span></td>';
    h+='</tr>';
  });
  h+='</tbody></table>';
  el.innerHTML=h;
}

/* ═══ BACKLOG VIEW ═══ */
function rBacklog(){
  var el=document.getElementById('view-backlog'),h='';
  var ep=D.epics||[],tk=D.tickets||[];
  var byEpic={};ep.forEach(function(e){byEpic[e.id]=[]});
  var orphans=[];
  tk.forEach(function(t){if(t.epicId&&byEpic[t.epicId])byEpic[t.epicId].push(t);else orphans.push(t)});
  ep.forEach(function(e){
    var st=byEpic[e.id]||[];
    h+='<div class="bg-section"><div class="bg-sh">📁 '+e.id+': '+e.title+' ('+e.progress+'%)</div>';
    if(!st.length)h+='<div class="empty">No stories yet</div>';
    st.forEach(function(t){
      h+='<div class="bg-item" onclick="openTD(\''+t.id+'\')"><div class="bg-title">'+t.title+'</div>';
      h+='<div class="bg-meta"><span class="badge '+(t.severity||'').toLowerCase()+'">'+t.severity+'</span><span class="badge '+(t.category||'bug')+'">'+t.category+'</span><span>'+t.status.replace(/_/g,' ')+'</span>'+(t.assigned_to?'<span>👤 '+t.assigned_to+'</span>':'')+'</div></div>';
    });
    h+='</div>';
  });
  if(orphans.length){
    h+='<div class="bg-section"><div class="bg-sh">📋 Unassigned Tickets</div>';
    orphans.forEach(function(t){
      h+='<div class="bg-item" onclick="openTD(\''+t.id+'\')"><div class="bg-title">'+t.title+'</div>';
      h+='<div class="bg-meta"><span class="badge '+(t.severity||'').toLowerCase()+'">'+t.severity+'</span><span class="badge '+(t.category||'bug')+'">'+t.category+'</span></div></div>';
    });
    h+='</div>';
  }
  el.innerHTML=h;
}

/* ═══ TEAM VIEW ═══ */
function rTeam(){
  try{
    var el=document.getElementById('view-team');
    if(!el){console.error('view-team element not found');return;}
    var teams={};
    var agents=D.agents||[];
    var tickets=D.tickets||[];
    console.log('rTeam: rendering', agents.length, 'agents');
    agents.forEach(function(a){
      if(!a.team)return;
      if(!teams[a.team])teams[a.team]=[];
      // Calculate progress from tickets
      var agentTickets=tickets.filter(function(t){return t.assigned_to===a.name});
      var done=agentTickets.filter(function(t){return t.status==='done'}).length;
      var total=agentTickets.length;
      var progress=total>0?Math.round(done/total*100):0;
      a._progress=progress;
      a._done=done;
      a._total=total;
      a._tickets=agentTickets;
      teams[a.team].push(a);
    });
    var order=['Leadership','Project','Research','Finance','Security','Operations'],h='';
    order.forEach(function(tm){
      if(!teams[tm])return;
      h+='<div class="team-section"><div class="team-sh">👥 '+tm+' ('+teams[tm].length+')</div><div class="team-grid">';
      teams[tm].forEach(function(a){
        // Determine real status based on work
        var realStatus='idle'; // default: active but not working
        if(a._total===0) {
          realStatus='idle'; // available but no tickets
        } else if(a._tickets.some(function(t){return t.status==='in_progress'})) {
          realStatus='working'; // actively working on something
        } else if(a._tickets.every(function(t){return t.status==='done'})) {
          realStatus='idle'; // all done, available for new work
        }
        // Check if agent has been idle too long (no files modified recently)
        // For now, use ticket status to determine

        var barWidth=10;
        var filled=Math.round(barWidth*a._progress/100);
        var bar='█'.repeat(filled)+'░'.repeat(barWidth-filled);

        // Status badge
        var badgeClass='idle';
        var badgeIcon='💤';
        var badgeText='IDLE';
        if(realStatus==='working'){badgeClass='working';badgeIcon='🔨';badgeText='WORKING';}
        else if(realStatus==='not-active'){badgeClass='not-active';badgeIcon='🔴';badgeText='NOT ACTIVE';}
        else if(realStatus==='troubleshooting'){badgeClass='troubleshooting';badgeIcon='🔧';badgeText='TROUBLESHOOTING';}

        h+='<div class="agent-card">';
        h+='<div class="agent-top"><span class="agent-emoji">'+(a.emoji||'👤')+'</span><span class="agent-status-badge '+badgeClass+'">'+badgeIcon+' '+badgeText+'</span></div>';
        h+='<div class="agent-name">'+a.name+'</div><div class="agent-title">'+a.title+'</div>';
        h+='<div class="agent-role">'+a.role+'</div>';
        if(a._total>0){
          h+='<div class="agent-progress"><div class="progress-bar"><div class="progress-fill" style="width:'+a._progress+'%"></div></div>';
          h+='<div class="progress-text">'+bar+' '+a._progress+'% ('+a._done+'/'+a._total+')</div></div>';
          h+='<div class="agent-ticket-list">';
          a._tickets.forEach(function(t){
            var tIcon=t.status==='done'?'✅':(t.status==='in_progress'?'🔨':'📋');
            h+='<div class="agent-ticket-item">'+tIcon+' '+t.id+': '+t.title.substring(0,35)+'</div>';
          });
          h+='</div>';
        } else {
          h+='<div class="agent-no-tickets">💤 Available — no tickets assigned</div>';
        }
        h+='</div>';
      });
      h+='</div></div>';
    });
    if(!h) h='<div class="empty">No agents found. Check tickets.json loaded correctly.</div>';
    el.innerHTML=h;
    console.log('rTeam: rendered successfully');
  }catch(e){
    console.error('rTeam error:', e);
  }
}

/* ═══ DETAIL PANELS ═══ */
function openTD(id){
  var t=(D.tickets||[]).find(function(x){return x.id===id});if(!t)return;
  var epic=t.epicId?(D.epics||[]).find(function(e){return e.id===t.epicId}):null;
  var blk=t.blockedBy?(D.tickets||[]).find(function(x){return x.id===t.blockedBy}):null;
  document.getElementById('dtitle').textContent=t.id+' — '+t.title;
  var h='';
  h+='<div class="ds"><div class="ds-id">'+t.id+(epic?' · ⬆ '+epic.id+': '+epic.title:'')+'</div><div class="ds-title">'+t.title+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Description</div><div class="ds-desc">'+(t.description||'No description')+'</div></div>';
  h+='<div class="ds-row"><div class="ds-col"><div class="ds-label">Status</div><select class="ds-select" onchange="uStatus(\''+t.id+'\',this.value)">';
  ['backlog','planned','in_progress','review','in_validation','done','waiting'].forEach(function(s){
    h+='<option value="'+s+'"'+(t.status===s?' selected':'')+'>'+s.replace(/_/g,' ')+'</option>';
  });
  h+='</select></div>';
  h+='<div class="ds-col"><div class="ds-label">Assignee</div><input class="ds-input" value="'+(t.assigned_to||'')+'" placeholder="Agent name..." onchange="uAssign(\''+t.id+'\',this.value)"></div></div>';
  h+='<div class="ds-row"><div class="ds-col"><div class="ds-label">Priority</div><span class="badge '+(t.severity||'').toLowerCase()+'">'+t.severity+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Category</div><span class="badge '+(t.category||'bug')+'">'+t.category+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Team</div><span style="font-size:10px">'+t.team+'</span></div></div>';
  if(blk)h+='<div class="ds"><div class="ds-label">⛔ Blocked By</div><div class="bi" onclick="openTD(\''+blk.id+'\')">'+blk.id+': '+blk.title+'</div></div>';
  if(t.blocks)h+='<div class="ds"><div class="ds-label">Blocks</div><div class="bi">'+t.blocks+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Comments</div>'+(t.comments&&t.comments.length?t.comments.map(function(c){return '<div class="cm"><span class="cm-by">'+c.by+':</span> '+c.text+'</div>'}).join(''):'<div style="color:var(--text3);font-size:9px">No comments</div>')+'</div>';
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}

function openED(id){
  var e=(D.epics||[]).find(function(x){return x.id===id});if(!e)return;
  var st=(D.tickets||[]).filter(function(t){return t.epicId===e.id});
  var dn=st.filter(function(s){return s.status==='done'}).length;
  var pct=st.length?Math.round(dn/st.length*100):0;
  document.getElementById('dtitle').textContent=e.id+' — EPIC';
  var h='';
  h+='<div class="ds"><div class="ds-id" style="color:var(--blue)">'+e.id+' · EPIC</div><div class="ds-title">'+e.title+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Description</div><div class="ds-desc">'+(e.description||'No description')+'</div></div>';
  h+='<div class="ds"><div class="ds-label">Progress</div><div class="progress"><div class="progress-fill" style="width:'+pct+'%"></div></div><div class="pd">'+pct+'% ('+dn+'/'+st.length+' stories done)</div></div>';
  h+='<div class="ds-row"><div class="ds-col"><div class="ds-label">Priority</div><span class="badge '+(e.priority||'')+'">'+e.priority+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Team</div><span style="font-size:10px">'+(e.team||'—')+'</span></div>';
  h+='<div class="ds-col"><div class="ds-label">Assignee</div><span style="font-size:10px">'+(e.assignee||'Unassigned')+'</span></div></div>';
  h+='<div class="ds"><div class="ds-label">Linked Stories ('+st.length+')</div>'+st.map(function(s){return '<div class="si" onclick="openTD(\''+s.id+'\')"><span class="sd '+s.status+'"></span><span style="font-family:monospace;font-size:8px;color:var(--blue)">'+s.id+'</span> '+s.title+(s.blockedBy?' <span class="badge bl" style="font-size:6px">BLOCKED</span>':'')+'</div>'}).join('')+'</div>';
  document.getElementById('db').innerHTML=h;
  document.getElementById('dp').classList.add('op');
}

function closeDetail(){document.getElementById('dp').classList.remove('op')}
function uStatus(id,s){var t=D.tickets.find(function(x){return x.id===id});if(t){t.status=s;t.updatedAt=(new Date()).toISOString();recalc();render();showNotif('Status updated','success');}}
function uAssign(id,a){var t=D.tickets.find(function(x){return x.id===id});if(t){t.assigned_to=a;t.updatedAt=(new Date()).toISOString();recalc();render();showNotif('Assignee updated','success');}}
function showNotif(msg,type){var el=document.createElement('div');el.className='notif '+(type||'');el.textContent=msg;document.body.appendChild(el);setTimeout(function(){el.remove();},2000);}
function toggleFullscreen(){if(!document.fullscreenElement){document.documentElement.requestFullscreen();}else{document.exitFullscreen();}}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeDetail()});
loadData();
setInterval(loadData,30000);
</script>
